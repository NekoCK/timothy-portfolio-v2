<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: blob: https://raw.githubusercontent.com; connect-src https://api.github.com; style-src 'self'; script-src 'self'; base-uri 'none'; form-action 'none'">
  <title>Timothy Portfolio — Case Studies 後台</title>
  <link rel="stylesheet" href="styles.css?v=20260720e">
</head>
<body>
  <header class="topbar">
    <div class="shell topbar__inner">
      <a class="brand" href="../#home"><span class="brand__mark">TL</span><span><strong>Portfolio CMS</strong><small>Case Studies 內容與圖片</small></span></a>
      <div class="status" data-status><i></i><span data-status-text>尚未連線</span></div>
    </div>
  </header>

  <main class="shell page">
    <section class="auth-layout" data-auth>
      <div class="intro panel">
        <span class="eyebrow">GitHub CMS v2</span>
        <h1>每個案例，都用同一套清楚的內容結構。</h1>
        <p>你可以更新案例文字、重點與圖片，並在任何 section 新增圖片。發布後 GitHub Pages 會自動更新。</p>
      </div>
      <div class="auth-card panel">
        <h2>連接 GitHub</h2>
        <p>使用只限 <strong>timothy-portfolio-v2</strong> 的 Fine-grained token，權限只需 Contents: Read and write。</p>
        <label class="field"><span>GitHub token</span><input type="password" autocomplete="off" spellcheck="false" placeholder="github_pat_…" data-token></label>
        <label class="remember"><input type="checkbox" data-remember-device> <span><strong>記住這台私人裝置</strong><small>Token 會留在這個瀏覽器，直到登出、過期或清除瀏覽器資料。</small></span></label>
        <div class="actions">
          <button class="button button--primary" type="button" data-connect>連接後台</button>
          <a class="button button--secondary" href="https://github.com/settings/personal-access-tokens/new" target="_blank" rel="noreferrer">建立 Token ↗</a>
        </div>
      </div>
    </section>

    <div class="notice" role="status" aria-live="polite" data-notice></div>

    <section class="cms" hidden data-cms>
      <div class="workspace-bar panel">
        <div>
          <span class="eyebrow">Case study editor</span>
          <h1>案例內容管理</h1>
        </div>
        <div class="workspace-actions">
          <label class="select-field"><span>內容語言</span><select data-locale></select></label>
          <a class="button button--secondary" href="../#home" target="_blank">預覽網站 ↗</a>
          <button class="button button--quiet" type="button" data-logout>登出</button>
        </div>
      </div>

      <nav class="project-tabs panel" aria-label="選擇案例" data-project-tabs></nav>
      <div data-editor></div>

      <div class="publish-bar panel">
        <div><strong data-pending-title>沒有待發布的變更</strong><span data-pending-detail>修改文字或圖片後可一次發布。</span></div>
        <div class="actions">
          <button class="button button--secondary" type="button" data-reload>放棄並重新載入</button>
          <button class="button button--primary" type="button" disabled data-publish><i class="spinner"></i><span data-publish-label>發布變更</span></button>
        </div>
      </div>
    </section>
  </main>

  <script src="app.js?v=20260720e"></script>
</body>
</html>
