通の標準コンポーネントはきれいなマスターライブラリに置き、製品固有のものは各子ライブラリに分離しました。","製品固有の変更がマスターを汚染しないため、マスターは一貫性を保ち、子側で柔軟に拡張できます。"],"points":[{"title":"同じ構造、異なるパレット","text":"1つのトークン構造でCymetricsとVulcanのブランドを維持。"},{"title":"クリーンなマスター","text":"共通コンポーネントを標準化して保護。"},{"title":"柔軟な子ライブラリ","text":"製品固有のコンポーネントは子側で拡張。"}],"quote":null,"media":[{"asset":"assets/images/original/onesleeveProcess3.png","layout":"wide","caption":"基盤のデザイン資料 1","alt":"基盤のデザイン資料 1"},{"asset":"assets/images/original/onesleeveProcess2.png","layout":"wide","caption":"基盤のデザイン資料 2","alt":"基盤のデザイン資料 2"},{"asset":"assets/images/original/onesleeveUseCase.png","layout":"wide","caption":"基盤のデザイン資料 3","alt":"基盤のデザイン資料 3"}]},{"order":4,"label":"ガバナンスと導入","title":"作るのは半分、使われて初めて完成する","body":["デザインシステムは設計品質よりも、採用されないことで失敗します。真の課題はサイロ化した組織に実際に使ってもらうことでした。","権限で強制せず、PMには市場投入と検証の速さ、開発には安定仕様と保守削減、管理者には課題を統合した経営判断の価値を示しました。","開発が納得すると導入は『命令』から『支持』へ変化。重複部品の保守がなくなり、Storybookが唯一の情報源となり、PMも小さな修正を扱えるようになりました。"],"points":[{"title":"PM—事業価値","text":"市場投入を短縮し、より速く検証。"},{"title":"RD—開発価値","text":"一貫した仕様、一度の変更、保守の削減。"},{"title":"Manager—支援","text":"散在する課題を経営層の支持へ統合。"}],"quote":"デザインシステムの本当の難しさは技術ではなく、サイロ化した組織に採用してもらうことでした。","media":[{"asset":"assets/images/original/onesleeveCymetricsPanel.png","layout":"half","caption":"導入のデザイン資料 1","alt":"導入のデザイン資料 1"},{"asset":"assets/images/original/onesleeveVulcanPanel.png","layout":"half","caption":"導入のデザイン資料 2","alt":"導入のデザイン資料 2"},{"asset":"assets/images/original/onesleeveResult1.png","layout":"portrait","caption":"導入のデザイン資料 3","alt":"導入のデザイン資料 3"},{"asset":"assets/images/original/onesleeveResult2.png","layout":"half","caption":"導入のデザイン資料 4","alt":"導入のデザイン資料 4"},{"asset":"assets/images/original/onesleeveResult4.png","layout":"half","caption":"導入のデザイン資料 5","alt":"導入のデザイン資料 5"},{"asset":"assets/images/original/onesleeveResult5.png","layout":"half","caption":"導入のデザイン資料 6","alt":"導入のデザイン資料 6"},{"asset":"assets/images/original/onesleeveResult6.png","layout":"half","caption":"導入のデザイン資料 7","alt":"導入のデザイン資料 7"}]}],"outcomes":[{"value":"2 → 1週","label":"PM–デザイン反復"},{"value":"3 → 2日","label":"1画面の構築時間"},{"value":"変数を交換","label":"新製品をゼロから作らない"}],"name":"OneSleeve：2つのセキュリティブランドを支える1つのデザインシステム","canonicalSubtitle":"限られたスタートアップ環境でCymetricsとVulcanを1つの製品群に統合し、反復・開発・市場展開を高速化。","subtitle":"限られたスタートアップ環境でCymetricsとVulcanを1つの製品群に統合し、反復・開発・市場展開を高速化。","year":"2026","keyAchievement":"1つのシステムでPM–デザイン反復を半減し、1画面の構築を3日から2日に短縮。","cover":"assets/images/original/onesleeveHero.png","sourceBoard":"assets/images/original/onesleeveArtifact.png","cardDescription":"4層トークンとマスター／子ライブラリでCymetricsとVulcanを統合。","category":"サイバーセキュリティ · デザインシステム","description":"市場適合を探りながら2つのセキュリティ製品を並行運用する中、断片化したデザインがブランドを弱め、開発を遅らせていました。私はCymetricsとVulcanをOneSleeveという1つの製品群へ統合することを提案。4層トークンとマスター／子コンポーネントライブラリで、1つのシステムから2ブランドを支えました。"},"alphacamp":{"slug":"alphacamp","index":"04","title":"プログラミング教育プラットフォームの継続戦略：機能提供から深いユーザー接点へ","role":"UXリサーチャー","timeline":"2020.11–2021.01（3か月）","team":"Ricky、Kim、Evy","scope":"ユーザーリサーチ","accent":"#ff5a16","soft":"#ffe1d0","dark":"#8d2d08","summary":{"goal":"ブランドロイヤルティの現状を診断し、長期的な関与を促す要因と障壁を特定する。","challenge":"修了後に卒業生の交流が急落し、コミュニティ参加や成果共有の動機が弱かった。","outcome":"8件以上のサービス提案を定義し、調査結果を年間プロダクトロードマップへ組み込んだ。"},"sections":[{"order":1,"label":"定義と探索","title":"複合リサーチで主要フローとペルソナを特定","body":["初期段階では、抽象的で不確実な「ブランド関係」を扱う必要がありました。私は不足していた領域知識を補うため、定性調査の枠組みを設計しました。","社内専門家ワークショップとデプスインタビューを実施し、意思決定者の期待と断片的な事業観察を一つの可視化された知識基盤にまとめました。","ステークホルダーマップで学生、TA、専門家、マーケティングの関係を可視化し、動機と関与を左右する接点を特定しました。"],"points":[{"title":"領域知識の獲得","text":"専門家ワークショップと面談で知識の差を埋める。"},{"title":"エコシステム分析","text":"相互作用と主要な動機接点を可視化。"},{"title":"初期ペルソナと旅程","text":"Kelly、Tom、Amyを基に後続調査を集中。"}],"quote":null,"media":[{"asset":"assets/images/original/alphacampProcess1.jpg","layout":"wide","caption":"定義と探索のデザイン資料 1","alt":"定義と探索のデザイン資料 1"}]},{"order":2,"label":"リサーチの洞察","title":"インタビューから中核価値を抽出","body":["在学生と見込み学生を含む10名へのデプスインタビューと統合分析から、複雑な行動変数を3つのペルソナへ整理しました。","開発コストを考慮しながら事業効果を最大化するため、動機が明確で事業性の高い2ペルソナに後続調査と解決策を集中しました。","転職者Kellyには進捗の可視化と感情的支援、学び直しのTomには要約された高品質情報と邪魔にならないリマインダーが必要でした。"],"points":[{"title":"Kelly—転職者","text":"進捗の可視化と継続的な感情支援。"},{"title":"Tom—スキル向上","text":"要約情報と非侵入的リマインダー。"},{"title":"戦略的選択","text":"動機と事業性が最も高い対象へ資源を集中。"}],"quote":null,"media":[{"asset":"assets/images/original/alphacampProcess2.jpg","layout":"wide","caption":"中核洞察のデザイン資料 1","alt":"中核洞察のデザイン資料 1"}]},{"order":3,"label":"課題と戦略","title":"「関係」というブラックボックスを解く","body":["ペルソナは静的属性を示しますが、関係が強まる／弱まる理由や動的なきっかけは説明しません。文脈がなければ解決策は現実ではなく仮説に依存します。","機能操作から感情の旅へ分析を移し、深い接点を生むものと、孤立・断絶を生むものを調べました。","Love Letter & Breakup Letterで文脈的証拠を集め、Relationship Critical Moments Mapで抽象的な関係を議論・設計できる単位へ変換しました。"],"points":[{"title":"重要な感情接点","text":"学習段階ごとの関係の揺れを検証。"},{"title":"感情の振り返り","text":"安心、導き、孤立、断絶の瞬間を抽出。"},{"title":"関係の重要瞬間マップ","text":"きっかけ、感情、必要性、緊急度、頻度を具体化。"}],"quote":"Love Letterは安全で導かれた道を評価し、Breakup Letterは密度の高い内容が生む息苦しい孤立感を語りました。","media":[{"asset":"assets/images/original/alphacampProcess3.jpg","layout":"wide","caption":"コンセプト戦略のデザイン資料 1","alt":"コンセプト戦略のデザイン資料 1"}]},{"order":4,"label":"設計結果と成果","title":"二軸のエコシステムで継続学習を支援","body":["Kellyには「未知をなくす」「感情の緩衝をつくる」ことを軸に、スキル診断、学習ロードマップ、実践、仲間の支援で成長を可視化しました。","断片的な時間でROIを重視するTomには、プロセス自動化と質の高い情報取得で、忙しい生活へ学習を統合しました。","離脱の原因は機能不足ではなく孤独と不安だという調査結果から、Semester 2–3のカリキュラムを調整し、単純な課題システムからRoadmapとCareer Guidanceへ開発資源を移しました。"],"points":[{"title":"エコシステム1—Kelly","text":"診断、実践、感情支援で安心と成長軌跡を構築。"},{"title":"エコシステム2—Tom","text":"効率的な学習と専門ネットワークで断片時間に対応。"},{"title":"セルフサービスと仲間支援","text":"Roadmapと小グループでTAを線形増員せず拡張。"}],"quote":"戦略転換：機能から関係へ。","media":[{"asset":"assets/images/original/alphacampHero.jpg","layout":"wide","caption":"サービスモデルのデザイン資料 1","alt":"サービスモデルのデザイン資料 1"}]}],"outcomes":[{"value":"8+","label":"対象別サービス提案"},{"value":"10","label":"デプスインタビュー"},{"value":"年間ロードマップ","label":"調査知見を正式な製品計画へ反映"}],"name":"プログラミング教育プラットフォームの継続戦略：機能提供から深いユーザー接点へ","canonicalSubtitle":"UXリサーチで学習の孤立感を解消し、取引的な関係から仲間としての関係へ移行するロードマップ。","subtitle":"UXリサーチで学習の孤立感を解消し、取引的な関係から仲間としての関係へ移行するロードマップ。","year":"2021","keyAchievement":"8件以上のサービス提案を定義し、調査知見を年間製品ロードマップへ反映。","cover":"assets/images/original/alphacampHero.jpg","sourceBoard":"assets/images/original/alphacampArtifact.png","cardDescription":"受講後の継続を、つながり・成長・長期ブランド関係から再定義した3か月のUXリサーチ。","category":"EdTech · サービス戦略","description":"台湾のプログラミング教育プラットフォームALPHAcampでは、受講修了後に学生の関与と継続率が急落する課題がありました。そこで同僚と3か月間のユーザーリサーチ／サービスデザインを実施しました。"}}}},"updatedAt":"2026-07-20T12:06:45.113Z"}</script>
