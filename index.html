  <script type="application/json" data-portfolio-content>{"version":4,"defaultLocale":"en","locales":["en","zh-Hant","ja"],"projectOrder":["ferqo","insurance","onesleeve","alphacamp"],"sharedAssets":{"portrait":"assets/images/original/portrait.jpg","workshop":"assets/images/original/workshop.jpg"},"content":{"en":{"site":{"brand":"Timothy Lau","browserTitle":"Timothy Lau — Product Designer","nav":{"work":"Work","about":"About","strengths":"Strengths","contact":"Contact","menu":"Menu"},"localeLabel":"Language","skip":"Skip to content","footer":"Built with patience, clarity, and care."},"home":{"hero":{"eyebrow":"Product designer · Team connector","titleBefore":"I bring patience, clarity, and","titleAccent":"connection.","body":"I design complex products by listening deeply, making hidden systems visible, and helping people with different perspectives move toward one shared decision.","primary":"See selected work","secondary":"Start a conversation","imageAlt":"Product designer in a calm studio setting"},"about":{"eyebrow":"About me","titleBefore":"I connect people and ideas to build","titleAccent":"better outcomes.","body":"I am at my best in the middle of a team: listening for what each discipline sees, translating constraints into a shared map, and giving difficult decisions enough time to become clear. I care about the interface, but I also care about the quality of the conversation that creates it.","imageAlt":"Designer facilitating a collaborative workshop","principles":[{"title":"Listen first","body":"Understand context, intent, and hidden constraints before deciding what to make."},{"title":"Facilitate","body":"Turn conflicting perspectives into one model the team can test together."},{"title":"Think in systems","body":"Connect individual screens to the product, operation, and long-term consequence."}]},"work":{"eyebrow":"Selected work","title":"Complex systems, made understandable enough to move forward.","body":"Four projects across connected homes, insurance operations, cybersecurity systems, and education strategy."},"strengths":{"eyebrow":"How I work","title":"Calm enough to examine the problem. Practical enough to keep it moving.","body":"My value is often the connective work between research, product, design, engineering, and operations.","items":[{"title":"Patience with ambiguity","body":"I resist premature certainty, ask the next useful question, and make room for evidence to change the direction."},{"title":"Shared understanding","body":"I use flows, models, prototypes, and workshops to help a team see the same system before debating the solution."},{"title":"Glue across disciplines","body":"I bridge language and incentives so good ideas can survive the handoff from insight to implementation."}]},"teamValue":{"eyebrow":"What teams get","title":"The invisible work that makes visible work stronger.","items":[{"title":"Clarity without oversimplifying","body":"I make complexity discussable while preserving the constraints that actually matter."},{"title":"Momentum without rushing","body":"I help teams distinguish a reversible experiment from a decision that deserves deeper care."},{"title":"Ownership beyond design","body":"I involve partners early enough that the final direction belongs to the team, not only the designer."}]},"contact":{"eyebrow":"Let’s connect","title":"Bring me the complicated part.","body":"I am interested in product and service problems where user needs, technical constraints, and organizational reality need to become one coherent direction.","button":"Say hello","availability":"Open to product design opportunities"}},"ui":{"viewCase":"View case study","keyAchievement":"Key achievement","caseStudy":"Case study","backToWork":"Back to selected work","role":"Role","timeline":"Timeline","team":"Team","scope":"Scope","snapshot":"Project snapshot","goal":"Goal","challenge":"Challenge","outcome":"Outcome","outcomes":"Outcomes","outcomesBody":"Measured outcomes recorded in the original project case study.","sourceBoard":"Original project board","sourceBoardTitle":"See the source material in context.","sourceBoardBody":"The original board is preserved here so the sequence, diagrams, and interface artifacts remain available without changing their content.","openImage":"Open image","openBoard":"Open full board","close":"Close image viewer","related":"Related work","relatedTitle":"Continue through the portfolio.","viewAll":"View all work","contactEyebrow":"Let’s work together","contactTitle":"Have a complex product problem?","contactBody":"I would be glad to hear what the team is trying to understand, align, or move forward.","contactButton":"Contact me","returnHome":"Return to homepage","imageCount":"Project image"},"projects":{"ferqo":{"slug":"ferqo","index":"01","title":"Ferqo — Orchestrating a Zero-Friction Smart Home Ecosystem","role":"Product Designer / Product Manager","timeline":"2018.11–2019.11","team":"Cross-functional product and engineering team","scope":"End-to-End Product Design, UX Research, Cross-Functional Team Leadership","accent":"#c96345","soft":"#f1ddd4","dark":"#7f3827","summary":{"goal":"Launch a 0-to-1 hardware-agnostic B2C platform to break vendor lock-in.","challenge":"Unvalidated user assumptions and the complexity of unifying different IoT protocols into one coherent experience.","outcome":"Reduced scenario operation time by about 50%, improved the SUS score by 30 points, and established a modular framework for cross-brand compatibility."},"sections":[{"order":1,"label":"The Business Challenge","title":"The Challenge: Breaking Vendor Lock-in & Redefining True B2C UX","body":["Legacy smart home systems locked users into single protocols and manufacturer roadmaps, restricting cross-brand automation and business scalability.","Existing apps functioned like engineering dashboards. They forced users to hunt for individual devices and exposed technical categories, creating severe cognitive friction for simple daily tasks.","Our ultimate insight was straightforward: if opening an app takes longer than pressing a wall switch, the digital product fails. The goal was to create zero-friction digital orchestration that could outperform physical remotes."],"points":[{"title":"Protocol Silos","text":"Legacy setups restricted users to a single protocol, suffocating cross-brand automation possibilities."},{"title":"The ‘Fake B2C’ Device-Centric UI","text":"Existing apps functioned like engineering dashboards and forced users to hunt for individual devices."},{"title":"The ‘Physical Switch’ Rivalry","text":"The digital experience had to complete everyday scenarios faster than a physical switch."}],"quote":null,"media":[{"asset":"assets/images/original/ferqoProcess1.png","layout":"wide","caption":"The legacy device-first interface exposed technical categories before household intent.","alt":"The legacy device-first interface exposed technical categories before household intent."},{"asset":"assets/images/original/ferqoProcess3.png","layout":"portrait","caption":"Legacy and redesigned structures: device categories become room and scenario entry points.","alt":"Legacy and redesigned structures: device categories become room and scenario entry points."}]},{"order":2,"label":"Research & Key Insight","title":"Validating the ‘One-Tap’ Value","body":["Initially, we aimed to compete in the DIY smart home market with fine-grained controls, similar to Xiaomi or Nest. However, our user research (9 depth interviews) revealed a fundamental mismatch: users don’t want to ‘play with IoT’—they rarely open the app proactively.","Instead, they seek a ‘Premium Solution’ that prioritizes ‘one-tap comfort.’ This validated our pivot from a volume-based feature war toward a value-based strategy, where we prioritize minimal interaction steps to achieve a comfortable state."],"points":[{"title":"Cognitive Overload","text":"Legacy apps force users to translate simple needs into complex technical steps, such as finding the device, checking the protocol, then toggling."},{"title":"Mental Model Mismatch","text":"Interfaces organized by devices clash with human intuition. Users think in terms of rooms and scenarios, not hardware lists."},{"title":"Broken Ecosystems","text":"Daily routines like Movie Mode require multi-brand coordination, which was previously blocked by single-protocol limitations."}],"quote":null,"media":[{"asset":"assets/images/original/ferqoProcess2.png","layout":"wide","caption":"A day-in-the-life journey mapped expectations, emotional friction, and automation opportunities.","alt":"A day-in-the-life journey mapped expectations, emotional friction, and automation opportunities."}]},{"order":3,"label":"Feasibility Assessment","title":"Collaborating with Engineering to Clarify MVP Scope and Technical Complexity","body":["To ensure design feasibility, I led the technical scoping process. I collaborated with engineers through workshops to map resources and confirm vendor API capabilities, successfully breaking scenario control into implementable MVP modules.","I developed system architecture and flowcharts to define front-end and back-end responsibilities, which helped reprioritize the roadmap and align design with implementation.","Three principles guided the flow restructuring: navigation was reorganized around rooms rather than device lists; the three most frequently used devices were pinned to the top of each room page; and advanced configuration was pushed deeper into the hierarchy."],"points":[{"title":"Room-Based Navigation","text":"People orient by space. Mapping navigation to this mental model eliminated the device-hunting problem identified in research."},{"title":"Most-Used Devices First","text":"The three most frequently used devices were pinned to the top so common actions required zero scrolling."},{"title":"Progressive Complexity","text":"Daily operation screens show only what users need to execute a scenario; protocol-level settings remain accessible but out of the way."}],"quote":null,"media":[{"asset":"assets/images/original/ferqoUserFlow.png","layout":"portrait","caption":"The revised flow organizes entry points around home, rooms, scenes, and device detail.","alt":"The revised flow organizes entry points around home, rooms, scenes, and device detail."},{"asset":"assets/images/original/ferqoStructure.png","layout":"half","caption":"The service architecture aligned software, SDK, cloud, and hardware dependencies.","alt":"The service architecture aligned software, SDK, cloud, and hardware dependencies."},{"asset":"assets/images/original/ferqoCompare.png","layout":"half","caption":"Feasibility boundaries clarified what the MVP could support without custom API UIs or BLE auto-room switching.","alt":"Feasibility boundaries clarified what the MVP could support without custom API UIs or BLE auto-room switching."}]},{"order":4,"label":"Design Execution & Outcomes","title":"Control the Whole House with One Finger","body":["Based on observation, users are accustomed to remembering devices by room. We incorporated this logic into the app, allowing users to switch between rooms and view device content by swiping left and right. Frequently used devices are placed at the top based on user habits, with larger device buttons and touch areas for easy identification.","All device operations are completed on one page, so users don’t need to switch pages to change the remote control. Remote-control content can also be arranged according to user preferences, while widgets let users control scenes without entering the app.","A/B testing between the existing Fibaro app and the new Ferqo app showed that the steps and time needed to complete a daily routine were roughly cut in half. The new version’s SUS score also increased by about 30 points on average."],"points":[{"title":"Room-Based Logic","text":"Users can switch between rooms and view device content by swiping left and right."},{"title":"All-in-One Device Control","text":"All device operations are completed on one page without switching pages to change the remote control."},{"title":"Control Scenes without Entering the App","text":"Users can set up widgets themselves for more convenient use."}],"quote":"Although Ferqo did not ultimately launch on the client side, the room-based, scenario-centric direction validated a substantial reduction in operation cost and improved perceived usability.","media":[{"asset":"assets/images/original/ferqoExplain1.png","layout":"half","caption":"Room-based logic, habit-based ordering, and larger touch targets made whole-home control easier to understand.","alt":"Room-based logic, habit-based ordering, and larger touch targets made whole-home control easier to understand."},{"asset":"assets/images/original/ferqoExplain2.png","layout":"half","caption":"All-in-one controls reduced page switching while allowing personalized remote layouts.","alt":"All-in-one controls reduced page switching while allowing personalized remote layouts."},{"asset":"assets/images/original/ferqoExplain3.png","layout":"wide","caption":"Widgets let people trigger familiar scenes without opening the app.","alt":"Widgets let people trigger familiar scenes without opening the app."},{"asset":"assets/images/original/ferqoRevamp.png","layout":"portrait","caption":"The evolved product direction moved from a legacy control panel to a calmer consumer experience.","alt":"The evolved product direction moved from a legacy control panel to a calmer consumer experience."},{"asset":"assets/images/original/ferqoScreenOverview.png","layout":"half","caption":"Screen overview covering setup, scenes, controls, and supporting states.","alt":"Screen overview covering setup, scenes, controls, and supporting states."},{"asset":"assets/images/original/ferqoDesignSystem.png","layout":"half","caption":"Reusable controls and visual foundations kept a diverse device ecosystem consistent.","alt":"Reusable controls and visual foundations kept a diverse device ecosystem consistent."}]}],"outcomes":[{"value":"50%","label":"reduction in scenario operation time"},{"value":"+30","label":"points in the SUS usability score"},{"value":"Modular","label":"framework supporting cross-brand compatibility"}],"name":"Ferqo — Orchestrating a Zero-Friction Smart Home Ecosystem","canonicalSubtitle":"Breaking vendor lock-in by abstracting fragmented IoT protocols into a true, scenario-driven B2C experience.","subtitle":"Breaking vendor lock-in by abstracting fragmented IoT protocols into a true, scenario-driven B2C experience.","year":"2019","keyAchievement":"Reduced scenario operation time by about 50% and improved the SUS usability score by 30 points.","cover":"assets/images/original/ferqoHero.png","sourceBoard":"assets/images/original/ferqoArtifact.png","cardDescription":"A 0-to-1, hardware-agnostic smart home platform that broke vendor lock-in and turned fragmented IoT protocols into a scenario-driven B2C experience.","category":"IoT · Smart Home","description":"As a former distributor for closed smart home systems, our business scalability was severely restricted by single-protocol limitations (like Z-Wave) and the manufacturer’s rigid product roadmap. To achieve strategic independence, we initiated the Ferqo 0-to-1 project. I led the end-to-end product design, translating the vision of an open, multi-protocol platform into an intuitive ecosystem that truly prioritizes everyday consumers over system integrators."},"insurance":{"slug":"insurance","index":"02","title":"Architecting a Scalable Insurance SaaS: From Custom Silos to a Modular Ecosystem","role":"Product Designer","timeline":"2024.11–2024.12 (1 month)","team":"Insurance, business development, sales, design, and engineering","scope":"User Interviews, User Flow, Mockup Handoff to Engineering, Lead Designer","accent":"#426f9d","soft":"#dfeaf3","dark":"#234867","summary":{"goal":"Turn a highly customized insurance platform into reusable modules that can support different products and distribution channels.","challenge":"Meet non-negotiable regulatory requirements while keeping long application flows clear, fast, and adaptable to different client brands.","outcome":"Doubled communication efficiency, reduced internal development costs by 50%, and shortened new-client design time from one week to two days."},"sections":[{"order":1,"label":"Background","title":"Reframing the Modular Architecture Around Scenarios and Business Goals","body":["IXT is a digital insurance platform launched by AI.f(T), with the core goal of simplifying complex insurance processes and digitizing the entire journey from quotation to policy issuance so existing operations can be optimized and become more efficient.","Strategically, IXT is not only a full digital insurance solution, but can also be decomposed into modules to support different insurance products and distribution channels.","This project focused on one of these decomposed functional lines and optimized the experience so that insurance products can be launched faster and pushed into target markets more effectively."],"points":[{"title":"Excessive Customization","text":"Every project became a heavily customized build with almost no shared standards, making the platform hard to scale and continuously optimize."},{"title":"Unclear Project Cost","text":"Sales repeatedly clarified requirements while design and engineering struggled to estimate effort, scope, and budget early."},{"title":"Limited Scalability","text":"One-off client engagements prevented the platform from accumulating standard modules and limited overall capacity and margin."}],"quote":null,"media":[{"asset":"assets/images/original/insuranceIxtIntro.png","layout":"wide","caption":"The product sat between insurers, cybersecurity partners, and market-specific operations.","alt":"The product sat between insurers, cybersecurity partners, and market-specific operations."},{"asset":"assets/images/original/insuranceProcess1.png","layout":"half","caption":"The architecture had to satisfy vendor visibility and consumer comprehension at the same time.","alt":"The architecture had to satisfy vendor visibility and consumer comprehension at the same time."},{"asset":"assets/images/original/insuranceCompetitive.png","layout":"half","caption":"Competitive analysis separated required information, filling flow, and brand expectations.","alt":"Competitive analysis separated required information, filling flow, and brand expectations."}]},{"order":2,"label":"Definition & Exploration","title":"Excessive Customization Drove Up Project Costs","body":["The legacy system offered clients a high degree of freedom, similar to a ‘WordPress for insurance’, which meant every project became a heavily customized build with almost no shared standards.","Although end users had flexibility in page layout and flow, sales needed to repeatedly clarify requirements, and the development team struggled to estimate scope and cost, ultimately hurting project efficiency and profitability.","By combining interviews and data from sales, customer support, and B-side clients, several key issues affecting application experience and conversion were identified."],"points":[{"title":"Complex Application Flow","text":"Users need each page to focus on one type of information so they can clearly understand what to prepare and complete the application more smoothly."},{"title":"Heavy Legal Text","text":"Insurers must present a large amount of regulatory text, which often conflicts with the need to simplify the interface and structure."},{"title":"Complex Customer Attributes","text":"The system must serve different identities and needs, but the existing platform only supported a single shared layout."}],"quote":null,"media":[{"asset":"assets/images/original/insuranceProcess2.png","layout":"wide","caption":"The end-to-end journey exposed decisions, reviews, exceptions, and completion states.","alt":"The end-to-end journey exposed decisions, reviews, exceptions, and completion states."},{"asset":"assets/images/original/insuranceTaskCentered.png","layout":"portrait","caption":"Task-centered structure simplified the application around the user’s next decision.","alt":"Task-centered structure simplified the application around the user’s next decision."},{"asset":"assets/images/original/insuranceSplitFlow.png","layout":"wide","caption":"Long and text-heavy flows were divided without losing legal and operational context.","alt":"Long and text-heavy flows were divided without losing legal and operational context."}]},{"order":3,"label":"Core Strategy","title":"The Tension Between Regulatory Compliance and User Experience","body":["I faced a three-way conflict between key stakeholders: 2B vendors require high visibility for legal disclaimers, while business teams and end users demand simple, fast operation flows.","Considering the unique characteristics of the insurance industry, I identified regulatory compliance as the foundation of product development and adopted a strategy of prioritizing business compliance while optimizing the experience through visual architecture.","The strategy was to define a set of reusable insurance templates and flow logic, constraining customization within this framework so costs became estimable and future product scaling would be supported."],"points":[{"title":"Regulatory Module","text":"Satisfy 2B vendors’ visibility requirements for legal disclaimers and avoid violations."},{"title":"Summary Module","text":"Allow users to capture insurance protection key points within three seconds and move quickly into the application."},{"title":"Reusable Templates","text":"Constrain customization within a reusable framework so costs can be estimated and future products can scale."}],"quote":null,"media":[{"asset":"assets/images/original/insuranceModular.png","layout":"half","caption":"Modular patterns separated reusable workflow behavior from program-specific content.","alt":"Modular patterns separated reusable workflow behavior from program-specific content."},{"asset":"assets/images/original/insuranceProcess3.png","layout":"half","caption":"Reusable landing-page templates shortened communication and launch cycles.","alt":"Reusable landing-page templates shortened communication and launch cycles."},{"asset":"assets/images/original/insuranceColorVariant.png","layout":"wide","caption":"One structure supported light, cyber-security, and cyber-assets visual variants.","alt":"One structure supported light, cyber-security, and cyber-assets visual variants."}]},{"order":4,"label":"Design Execution","title":"Balancing Regulatory Compliance with Usability","body":["I adopted a progressive disclosure strategy. For mandatory 2B vendor compliance information, I used scrollable or expandable modules to contain details. The intent was to ensure legal compliance while prioritizing core coverage information for users—keeping their focus on key decisions rather than information overload.","The team also created color tokens and naming rules in Figma Variables so different brand themes could be applied to the same components with just a few clicks. This reduced design time from roughly one week to about two days.","The landing-page layout and flow were redefined into templates, modularizing the hero section, feature descriptions, plan comparison, FAQ, and documents. Sales could respond within a clear structure instead of starting from a blank page, while design and front-end adjusted brand visuals and copy within fixed constraints."],"points":[{"title":"Task-Centered Design","text":"Users focus on individual tasks such as comparing plans and uploading documents without regulatory clutter."},{"title":"Reusable Landing Pages","text":"Hero, features, plans, FAQ, and documents became reusable modules that improved communication efficiency."},{"title":"Rapid Client Adaptation","text":"For Marsh, Shin Kong Vietnam, Richmond, and other clients, the team adjusted brand colors, imagery, and copy instead of rebuilding the foundation."}],"quote":"Breaking down the original high-customization architecture allowed IXT to move from project-based SI work toward a scalable insurance SaaS product.","media":[{"asset":"assets/images/original/insuranceCaseStudies.png","layout":"wide","caption":"The system covered both customer-facing applications and operational insurance tools.","alt":"The system covered both customer-facing applications and operational insurance tools."},{"asset":"assets/images/original/insuranceDesignSystem.png","layout":"compact","caption":"The design system documented bilingual typography, components, validation, and loading states.","alt":"The design system documented bilingual typography, components, validation, and loading states."},{"asset":"assets/images/original/insuranceMarsh.png","layout":"half","caption":"A Tesla motor-insurance journey demonstrated the reusable quote and plan architecture.","alt":"A Tesla motor-insurance journey demonstrated the reusable quote and plan architecture."},{"asset":"assets/images/original/insuranceRichmond.png","layout":"half","caption":"A partner-branded insurance experience applied the same reusable foundation.","alt":"A partner-branded insurance experience applied the same reusable foundation."},{"asset":"assets/images/original/insuranceShinKong.png","layout":"wide","caption":"A market-specific delivery retained partner identity while sharing the application model.","alt":"A market-specific delivery retained partner identity while sharing the application model."},{"asset":"assets/images/original/insuranceResult1.png","layout":"half","caption":"Light-theme application flow.","alt":"Light-theme application flow."},{"asset":"assets/images/original/insuranceResult2.png","layout":"half","caption":"Dark-theme application flow.","alt":"Dark-theme application flow."},{"asset":"assets/images/original/insuranceResult3.png","layout":"compact","caption":"Blue cyber-security application flow.","alt":"Blue cyber-security application flow."}]}],"outcomes":[{"value":"2×","label":"communication efficiency between BD / sales and clients"},{"value":"50%","label":"reduction in internal development costs"},{"value":"2 days","label":"new-client design time, down from one week"}],"name":"Architecting a Scalable Insurance SaaS: From Custom Silos to a Modular Ecosystem","canonicalSubtitle":"Balancing rigorous regulatory compliance with frictionless UX through a design-token-driven architecture.","subtitle":"Balancing rigorous regulatory compliance with frictionless UX through a design-token-driven architecture.","year":"2024","keyAchievement":"A reusable modular framework doubled communication efficiency and reduced internal development costs by 50%.","cover":"assets/images/original/insuranceHero.png","sourceBoard":"assets/images/original/insuranceArtifact.png","cardDescription":"A modular insurance SaaS architecture that balances regulatory compliance, usability, reusable templates, and brand scalability.","category":"Insurtech · B2B SaaS","description":"IXT is a digital insurance platform launched by AI.f(T), with the core goal of simplifying complex insurance processes and digitizing the entire journey from quotation to policy issuance so existing operations can be optimized and become more efficient."},"onesleeve":{"slug":"onesleeve","index":"03","title":"OneSleeve: One Design System Powering Two Security Brands","role":"Product Designer","timeline":"2025.12–2026.03","team":"Product, design, and engineering","scope":"Design System Architecture, Cross-Functional Collaboration (PM/RD), Component Governance","accent":"#d8a72d","soft":"#f5e9bd","dark":"#6d5313","summary":{"goal":"Create one design system to unify two security products—faster delivery and easier scaling.","challenge":"Brand dilution, design debt, and multi-market pressure under startup constraints.","outcome":"PM-design iteration dropped from two weeks to one; per-screen build time dropped from three days to two; and new product lines can be created by swapping variables."},"sections":[{"order":1,"label":"The Challenge","title":"A Branding Problem That Exposed a Systemic One","body":["Cymetrics and Vulcan looked like products from two different companies. We set out to unify them—and uncovered the design debt underneath.","The company faced three layers of the problem: scattered product lines diluted market positioning; there was no shared design language and one to two days were lost per inconsistency fix; and expanding into markets such as the Middle East meant re-adapting from scratch for every new locale, including RTL.","All of it sat under one tension: a startup still searching for market fit, with limited resources, yet expected to ship MVPs fast and stay demo-ready at all times. This couldn’t be just a rebrand—it had to be a design system."],"points":[{"title":"Brand","text":"Scattered product lines diluted the company’s market positioning."},{"title":"Design & Engineering Debt","text":"No shared language, one to two days lost per inconsistency fix, and an unmaintainable Storybook."},{"title":"Scaling Bottleneck","text":"Every new locale or market required re-adapting the products from scratch."}],"quote":"Two products, two design languages, one confused brand.","media":[{"asset":"assets/images/original/onesleeveProcess1.png","layout":"wide","caption":"The same product family appeared as two very different interface languages.","alt":"The same product family appeared as two very different interface languages."},{"asset":"assets/images/original/onesleeveBrandColor.png","layout":"compact","caption":"Shared structural roles began with a clear primitive brand palette.","alt":"Shared structural roles began with a clear primitive brand palette."}]},{"order":2,"label":"Strategy & Decision","title":"Pragmatism over Perfection","body":["With urgent demos constantly disrupting the schedule, halting work to build a ‘perfect’ system wasn’t realistic. We needed a strategy that wouldn’t slow time to market, yet would end the cycle of reinventing the wheel for good.","Keeping the systems separate preserved maximum flexibility but multiplied maintenance and kept the brand fragmented. Rebuilding from scratch promised the purest result but doubled cost and complexity.","We chose to unify and converge: extract from what already existed, align the products, and accept an upfront convergence cost in exchange for easier maintenance, faster delivery, and a consistent brand."],"points":[{"title":"Keep As-Is","text":"Maximum flexibility and no upfront cost, but multiple systems to maintain and a fragmented brand."},{"title":"Rebuild from Scratch","text":"The purest, most coherent result, but double the cost and double the complexity."},{"title":"Unify & Converge","text":"Extract from what exists for easier maintenance, faster delivery, and a consistent brand."}],"quote":"Not a rebuild—converging existing products into one unified system.","media":[{"asset":"assets/images/original/onesleeveAdoption.png","layout":"half","caption":"Adoption connected product value, engineering value, and management sponsorship.","alt":"Adoption connected product value, engineering value, and management sponsorship."},{"asset":"assets/images/original/onesleeveCooperation.png","layout":"half","caption":"One source of pattern change synchronized user-story flows and reduced missed updates.","alt":"One source of pattern change synchronized user-story flows and reduced missed updates."}]},{"order":3,"label":"Foundation & Architecture","title":"One System, Two Brands","body":["From the lowest color primitive to the screen production line, every layer was engineered to balance consistency with flexibility. Color flows through four tiers: Brand → Primitive → Semantic → Component. Define one brand color, and the system auto-generates everything below.","Different products need different components, and a single library can’t cover every case. Universal, standardized components live in a clean master library shared by every product, while each product’s custom components live in its own child library.","The split prevents any one product from altering master components for its own needs and contaminating every other product. Customization happens only in child libraries; the master stays clean."],"points":[{"title":"Same Structure, Different Palette","text":"One token structure serves both Cymetrics and Vulcan while preserving distinct brand palettes."},{"title":"Clean Master","text":"Universal components stay standardized and protected in the shared master library."},{"title":"Flexible Children","text":"Product-specific components remain flexible inside separate child libraries."}],"quote":null,"media":[{"asset":"assets/images/original/onesleeveProcess3.png","layout":"wide","caption":"Primitive, semantic, and component tokens separated raw values from design intent.","alt":"Primitive, semantic, and component tokens separated raw values from design intent."},{"asset":"assets/images/original/onesleeveProcess2.png","layout":"wide","caption":"Master components fed product-specific pattern sets without duplicating behavior.","alt":"Master components fed product-specific pattern sets without duplicating behavior."},{"asset":"assets/images/original/onesleeveUseCase.png","layout":"wide","caption":"Component states were documented against real, data-heavy workspace use cases.","alt":"Component states were documented against real, data-heavy workspace use cases."}]},{"order":4,"label":"Governance & Adoption","title":"Building It Is Half the Battle—Getting It Adopted Is the Other Half","body":["Design systems rarely die from bad design—they die because no one adopts them. The real challenge was getting a siloed organization to actually use it.","We didn’t force it through authority—we made each side see the value first. PMs saw shorter time-to-launch and faster validation; engineers saw consistent specifications, edit-once behavior, and lower maintenance; managers saw synthesized pain points become a top-down mandate.","Once engineers bought in, adoption shifted from ‘mandated’ to ‘endorsed.’ Engineers stopped maintaining duplicate components, Storybook became a single source of truth, and PMs could even handle minor development tweaks themselves."],"points":[{"title":"PM — Business Value","text":"Cut time-to-launch and validate faster."},{"title":"RD — Engineering Value","text":"Consistent specs, edit once, and shared components that reduce maintenance."},{"title":"Manager — Mandate","text":"Synthesized pain points into top-down endorsement."}],"quote":"OneSleeve taught me that the real challenge of a design system isn’t technical—it’s getting a siloed organization to actually adopt it.","media":[{"asset":"assets/images/original/onesleeveCymetricsPanel.png","layout":"half","caption":"Cymetrics expressed the shared system through a light analytical interface.","alt":"Cymetrics expressed the shared system through a light analytical interface."},{"asset":"assets/images/original/onesleeveVulcanPanel.png","layout":"half","caption":"Vulcan expressed the same structural rules through a dark operational interface.","alt":"Vulcan expressed the same structural rules through a dark operational interface."},{"asset":"assets/images/original/onesleeveResult1.png","layout":"portrait","caption":"Token documentation for light product themes.","alt":"Token documentation for light product themes."},{"asset":"assets/images/original/onesleeveResult2.png","layout":"half","caption":"Token documentation for dark product themes.","alt":"Token documentation for dark product themes."},{"asset":"assets/images/original/onesleeveResult4.png","layout":"half","caption":"Profile and threat workspace patterns.","alt":"Profile and threat workspace patterns."},{"asset":"assets/images/original/onesleeveResult5.png","layout":"half","caption":"Policy workspace states and interaction coverage.","alt":"Policy workspace states and interaction coverage."},{"asset":"assets/images/original/onesleeveResult6.png","layout":"half","caption":"Production dashboard comparison across the two products.","alt":"Production dashboard comparison across the two products."}]}],"outcomes":[{"value":"2 → 1 week","label":"PM-design iteration cycle"},{"value":"3 → 2 days","label":"per-screen build time"},{"value":"Swap variables","label":"instead of rebuilding a new product line"}],"name":"OneSleeve: One Design System Powering Two Security Brands","canonicalSubtitle":"How a unified design system brought Cymetrics and Vulcan under one family—cutting iteration cycles, speeding delivery, and scaling toward new markets, all under tight startup constraints.","subtitle":"How a unified design system brought Cymetrics and Vulcan under one family—cutting iteration cycles, speeding delivery, and scaling toward new markets, all under tight startup constraints.","year":"2026","keyAchievement":"One system cut the PM-design iteration cycle in half and reduced per-screen build time from three days to two.","cover":"assets/images/original/onesleeveHero.png","sourceBoard":"assets/images/original/onesleeveArtifact.png","cardDescription":"A four-tier token architecture and master/child component library that unified Cymetrics and Vulcan without slowing a resource-constrained startup.","category":"Cybersecurity · Design System","description":"With two cybersecurity products running in parallel while still searching for market fit, fragmented design diluted the brand and slowed development. I proposed—from the design side—unifying Cymetrics and Vulcan into one product family: OneSleeve. Through a four-tier token architecture and a master/child component library, a single system serves two brands—letting a resource-strapped team validate the market faster and cheaper."},"alphacamp":{"slug":"alphacamp","index":"04","title":"Retention Strategy for Coding Education Platforms: Shifting from Functional Delivery to Deep User Connection","role":"UX Researcher","timeline":"2020.11–2021.01 (3 months)","team":"Ricky, Kim, Evy","scope":"User Research","accent":"#ff5a16","soft":"#ffe1d0","dark":"#8d2d08","summary":{"goal":"Diagnose the current state of brand loyalty and identify the key drivers and barriers to long-term engagement.","challenge":"A steep decline in alumni interaction after course completion led to low community engagement and little motivation to share work or success stories.","outcome":"Defined eight or more targeted service proposals and institutionalized research insights in the company’s annual product roadmap."},"sections":[{"order":1,"label":"Definition & Exploration","title":"Identifying Core Workflows and Personas Through Mixed-Method Research","body":["In the initial project phase, we were confronted with the abstract and highly uncertain topic of ‘brand relationships.’ I took ownership of structuring the qualitative research framework to address the team’s initial lack of domain knowledge.","My partner and I facilitated internal expert workshops and in-depth interviews, helping the team synthesize decision-makers’ expectations and transform fragmented business observations into a cohesive visual knowledge base.","By creating a Stakeholder Map, we mapped the interaction network between students, teaching assistants, subject-matter experts, and marketing, identifying the critical nodes and touchpoints that influence student motivation and engagement."],"points":[{"title":"Accelerating Domain Knowledge","text":"Expert workshops and interviews bridged the knowledge gap and consolidated business observations."},{"title":"Ecosystem & Influence Analysis","text":"A stakeholder map revealed the interaction network and critical motivational touchpoints."},{"title":"Proto-Personas & Initial Journeys","text":"Kelly the Career Changer, Tom the Upskiller, and Amy the Explorer established a focused basis for later interviews."}],"quote":null,"media":[{"asset":"assets/images/original/alphacampProcess1.jpg","layout":"wide","caption":"Mixed-method research mapped learner workflows, motivations, and post-course drop-off.","alt":"Mixed-method research mapped learner workflows, motivations, and post-course drop-off."}]},{"order":2,"label":"Research Insight","title":"Distilling the Core Value Proposition from Interview Insights","body":["Through in-depth interviews with 10 participants, including both current and prospective students, and comprehensive data synthesis, I guided the team in distilling three distinct personas from a wide array of complex behavioral variables.","To maximize business impact while being mindful of development costs, I proposed a strategic trade-off: focus subsequent research and solution design on the two core personas with the highest business potential and clearest motivation.","Kelly the Career Changer needed visualized progress tracking and consistent emotional encouragement to alleviate the uncertainty of a career transition. Tom the Upskiller needed high-quality condensed summaries and an effective, non-intrusive reminder system that fit fragmented time and professional fatigue."],"points":[{"title":"Kelly — The Career Changer","text":"Her urgent needs were visual progress tracking and consistent emotional encouragement."},{"title":"Tom — The Upskiller","text":"His needs centered on condensed summaries and a non-intrusive reminder system."},{"title":"Strategic Trade-Off","text":"Resources were focused on the personas with the clearest motivation and highest business potential."}],"quote":null,"media":[{"asset":"assets/images/original/alphacampProcess2.jpg","layout":"wide","caption":"Behavioral dynamics reframed the relationship gap beyond additional course content.","alt":"Behavioral dynamics reframed the relationship gap beyond additional course content."}]},{"order":3,"label":"Challenges & Core Strategy","title":"Decoding the ‘Relationship’ Black Box","body":["Personas illustrate static user attributes, but they do not explain the dynamic triggers and behavioral evidence behind why a relationship strengthens or falters. Without this contextual layer, proposed solutions risked being grounded in assumption rather than reality.","We shifted our analysis from functional operations to the underlying emotional journey, exploring what fostered a deep sense of connection versus a frustrating sense of disconnection.","Using the Love Letter & Breakup Letter research method, we captured contextual evidence and translated the originally abstract relationship into discussable and designable scenario units through a Relationship Critical Moments Map."],"points":[{"title":"Critical Emotional Touchpoints","text":"The team examined how the student-platform relationship fluctuated across key learning stages."},{"title":"Emotional Retrospection","text":"Love and breakup letters revealed moments of safety, guidance, isolation, and disconnection."},{"title":"Relationship Critical Moments Map","text":"Trigger events, emotions, needs, urgency, and frequency made the abstract relationship tangible."}],"quote":"A ‘Love Letter’ praised the safe, guided path; a ‘Breakup Letter’ described a suffocating sense of isolation caused by overly dense course content.","media":[{"asset":"assets/images/original/alphacampProcess3.jpg","layout":"wide","caption":"Retrospection and projection concepts made identity, progress, and future paths tangible.","alt":"Retrospection and projection concepts made identity, progress, and future paths tangible."}]},{"order":4,"label":"Design Result & Outcomes","title":"Dual-Track Ecosystem Design: Powering Continuous Learning Through Service Transformation","body":["For Kelly, the core strategy was to eliminate the unknown and provide an emotional buffer, transforming the pressure of learning into visible, motivating growth through skill diagnosis, a learning roadmap, hands-on practice, and peer support.","For Tom, a working professional with fragmented time who prioritizes ROI, the core strategy revolved around process automation and high-quality information retrieval so learning could be integrated into a busy life.","The research convinced the team that student churn wasn’t caused by a lack of features, but by feelings of loneliness and anxiety. This drove curriculum changes for Semesters 2–3 and reallocated development resources from a simple assignment system toward the Roadmap and Career Guidance features."],"points":[{"title":"Ecosystem One — Kelly","text":"Navigation, diagnosis, hands-on practice, and emotional support built security and a clear achievement trajectory."},{"title":"Ecosystem Two — Tom","text":"Efficient learning tools and professional networking supported fragmented schedules and high ROI expectations."},{"title":"Self-Service & Peer Support","text":"The Roadmap and small-group peer cohorts supported scale without a linear increase in teaching assistants."}],"quote":"Strategy Shift: From Features to Relationships.","media":[{"asset":"assets/images/original/alphacampHero.jpg","layout":"wide","caption":"The proposed ecosystem connected structured learning with continued relationships.","alt":"The proposed ecosystem connected structured learning with continued relationships."}]}],"outcomes":[{"value":"8+","label":"targeted service proposals"},{"value":"10","label":"in-depth research interviews"},{"value":"Annual roadmap","label":"research insights institutionalized in product planning"}],"name":"Retention Strategy for Coding Education Platforms: Shifting from Functional Delivery to Deep User Connection","canonicalSubtitle":"Breaking the learning ‘Sense of Isolation’ through UXR: A strategic roadmap from ‘Transactional’ to ‘Kinship’ relationships.","subtitle":"Breaking the learning ‘Sense of Isolation’ through UXR: A strategic roadmap from ‘Transactional’ to ‘Kinship’ relationships.","year":"2021","keyAchievement":"Defined eight or more targeted service proposals and brought the research insights into the company’s annual product roadmap.","cover":"assets/images/original/alphacampHero.jpg","sourceBoard":"assets/images/original/alphacampArtifact.png","cardDescription":"A three-month UX research and service-design initiative that reframed post-course retention around connection, progress, and long-term brand loyalty.","category":"EdTech · Service Strategy","description":"At ALPHAcamp, Taiwan’s leading programming education platform, we faced a critical business challenge: a sharp decline in student engagement and a lack of continued retention once they completed their courses. To address this, I partnered with a colleague on a three-month user research and service design initiative."}}},"zh-Hant":{"site":{"brand":"Timothy Lau","browserTitle":"Timothy Lau — 產品設計師","nav":{"work":"作品","about":"關於","strengths":"優勢","contact":"聯絡","menu":"選單"},"localeLabel":"語言","skip":"跳到主要內容","footer":"以耐心、清晰與關懷完成。"},"home":{"hero":{"eyebrow":"產品設計師 · 團隊連結者","titleBefore":"我用耐心釐清複雜，讓人與想法真正","titleAccent":"連結。","body":"我透過深入傾聽、讓隱藏系統變得可見，協助不同觀點的人走向同一個可執行的決定。","primary":"查看精選作品","secondary":"開始對話","imageAlt":"在工作室中的產品設計師"},"about":{"eyebrow":"關於我","titleBefore":"我連結人與想法，創造","titleAccent":"更好的結果。","body":"我最能發揮價值的地方，通常是團隊中間：聽見不同專業看到的事、把限制翻譯成共享地圖，並給困難決策足夠時間變得清楚。我在意介面，也在意產生介面的那場對話是否有品質。","imageAlt":"設計師在工作坊中協作","principles":[{"title":"先聽懂","body":"在決定做什麼前，先理解情境、意圖與隱藏限制。"},{"title":"促進共識","body":"把衝突觀點整理成團隊可以一起驗證的模型。"},{"title":"系統思考","body":"把單一畫面連回產品、營運與長期影響。"}]},"work":{"eyebrow":"精選作品","title":"讓複雜系統清楚到足以推動下一步。","body":"四個專案涵蓋智慧家庭、保險營運、資安系統與教育策略。"},"strengths":{"eyebrow":"我的工作方式","title":"足夠冷靜地理解問題，也足夠務實地推動進展。","body":"我的價值經常存在於研究、產品、設計、工程與營運之間的連結工作。","items":[{"title":"面對模糊的耐心","body":"不急著確定答案，先問下一個有用問題，也讓證據有機會改變方向。"},{"title":"建立共同理解","body":"用流程、模型、原型與工作坊，讓團隊先看見同一個系統再討論方案。"},{"title":"跨專業的黏著力","body":"橋接語言與誘因，讓好想法能從洞察走到實作。"}]},"teamValue":{"eyebrow":"團隊得到什麼","title":"讓可見成果更強的那些隱形工作。","items":[{"title":"清楚，但不過度簡化","body":"讓複雜變得可討論，同時保留真正重要的限制。"},{"title":"前進，但不倉促","body":"協助團隊分辨可逆實驗與值得更審慎決定的事情。"},{"title":"超越設計的共同責任","body":"讓合作夥伴足夠早參與，使最終方向屬於整個團隊。"}]},"contact":{"eyebrow":"保持聯絡","title":"把最複雜的部分帶來。","body":"我對需要整合使用者需求、技術限制與組織現實的產品與服務問題特別有興趣。","button":"寫信給我","availability":"開放產品設計合作機會"}},"ui":{"viewCase":"查看案例","keyAchievement":"關鍵成果","caseStudy":"案例研究","backToWork":"返回精選作品","role":"角色","timeline":"期間","team":"團隊","scope":"範圍","snapshot":"專案摘要","goal":"目標","challenge":"挑戰","outcome":"成果","outcomes":"成果","outcomesBody":"原始案例中記錄的量化成果。","sourceBoard":"原始專案長頁","sourceBoardTitle":"在完整脈絡中查看原始素材。","sourceBoardBody":"保留原始長頁，讓章節順序、圖表與介面素材不因重新排版而遺失。","openImage":"放大圖片","openBoard":"開啟完整長頁","close":"關閉圖片檢視","related":"相關作品","relatedTitle":"繼續瀏覽其他專案。","viewAll":"查看全部作品","contactEyebrow":"一起合作","contactTitle":"正在處理複雜的產品問題？","contactBody":"歡迎告訴我團隊正在理解、協調或推動什麼。","contactButton":"聯絡我","returnHome":"回到首頁","imageCount":"專案圖片"},"projects":{"ferqo":{"slug":"ferqo","index":"01","title":"Ferqo——打造零摩擦智慧家庭生態系","role":"產品設計師／產品經理","timeline":"2018.11–2019.11","team":"跨職能產品與工程團隊","scope":"端到端產品設計、UX 研究、跨職能團隊協作","accent":"#c96345","soft":"#f1ddd4","dark":"#7f3827","summary":{"goal":"推出硬體無關的 0 到 1 B2C 平台，打破供應商綁定。","challenge":"尚未驗證的使用者假設，以及把不同 IoT 協定整合成一致體驗的技術複雜度。","outcome":"情境操作時間約減少 50%，SUS 提升 30 分，並建立支援跨品牌相容性的模組化框架。"},"sections":[{"order":1,"label":"商業挑戰","title":"打破供應商綁定，重新定義真正的 B2C UX","body":["傳統智慧家庭系統把使用者鎖在單一協定與原廠路線圖中，限制跨品牌自動化與商業擴展。","既有 App 像工程儀表板，迫使使用者尋找個別裝置並理解技術分類，讓簡單日常任務產生高度認知摩擦。","最後的洞察很直接：如果打開 App 比按牆上開關更久，數位產品就失敗了。目標是打造比實體遙控器更快的零摩擦數位操作。"],"points":[{"title":"協定孤島","text":"單一協定限制跨品牌自動化。"},{"title":"假 B2C 的裝置導向介面","text":"工程式儀表板迫使使用者逐一尋找裝置。"},{"title":"與實體開關競爭","text":"數位操作必須比實體開關更快完成日常情境。"}],"quote":null,"media":[{"asset":"assets/images/original/ferqoProcess1.png","layout":"wide","caption":"挑戰相關設計素材 1","alt":"挑戰相關設計素材 1"},{"asset":"assets/images/original/ferqoProcess3.png","layout":"portrait","caption":"挑戰相關設計素材 2","alt":"挑戰相關設計素材 2"}]},{"order":2,"label":"研究與關鍵洞察","title":"驗證「一鍵完成」的價值","body":["我們原本想以細緻控制切入 DIY 智慧家庭市場，但 9 場深度訪談顯示根本落差：使用者不想『玩 IoT』，也很少主動打開 App。","他們真正要的是以『一鍵舒適』為核心的高品質解決方案。這讓策略從功能數量競賽，轉向以最少互動步驟達到舒適狀態。"],"points":[{"title":"認知負荷","text":"舊 App 迫使使用者把簡單需求翻譯成尋找裝置、確認協定、再切換狀態等技術步驟。"},{"title":"心智模型不符","text":"使用者以房間與情境思考，而不是硬體清單。"},{"title":"破碎的生態系","text":"電影模式等日常例行需要跨品牌協作，卻被單一協定阻擋。"}],"quote":null,"media":[{"asset":"assets/images/original/ferqoProcess2.png","layout":"wide","caption":"研究與關鍵洞察相關設計素材 1","alt":"研究與關鍵洞察相關設計素材 1"}]},{"order":3,"label":"可行性評估","title":"與工程協作，釐清 MVP 範圍與技術複雜度","body":["為確保可行性，我主導技術範圍界定，透過工作坊與工程師盤點資源和供應商 API 能力，把情境控制拆成可落地的 MVP 模組。","我建立系統架構與流程圖，定義前後端責任，協助重新排序路線圖並讓設計與開發對齊。","流程重整遵循三項原則：以房間取代裝置清單、把最常用的三個裝置置頂，以及把進階設定放到更深層級。"],"points":[{"title":"房間導向導航","text":"以空間對應人的心智模型，移除研究發現的『找裝置』問題。"},{"title":"常用裝置優先","text":"前三個常用裝置置頂，常見操作不需捲動。"},{"title":"漸進式複雜度","text":"日常畫面只呈現執行情境所需內容，協定設定仍可存取但不干擾。"}],"quote":null,"media":[{"asset":"assets/images/original/ferqoUserFlow.png","layout":"portrait","caption":"設計決策相關設計素材 1","alt":"設計決策相關設計素材 1"},{"asset":"assets/images/original/ferqoStructure.png","layout":"half","caption":"設計決策相關設計素材 2","alt":"設計決策相關設計素材 2"},{"asset":"assets/images/original/ferqoCompare.png","layout":"half","caption":"設計決策相關設計素材 3","alt":"設計決策相關設計素材 3"}]},{"order":4,"label":"設計執行與成果","title":"一指控制整個家","body":["觀察顯示，使用者習慣以房間記憶裝置，因此 App 允許左右滑動切換房間，並依使用習慣把常用裝置置頂，以更大的按鈕與觸控區提高辨識。","所有裝置操作集中在同一頁，遙控器內容也能依偏好排列；Widget 則讓使用者不進 App 就能控制情境。","與既有 Fibaro App 的 A/B 測試顯示，完成日常情境的步驟與時間約減半；新版 SUS 平均提升約 30 分。"],"points":[{"title":"以房間為核心","text":"左右滑動切換房間與裝置內容。"},{"title":"單頁裝置控制","text":"不需切換頁面即可完成遙控操作。"},{"title":"不進 App 控制情境","text":"使用者可自行設定 Widget。"}],"quote":"雖然 Ferqo 最終未在客戶端上線，但以房間與情境為核心的方向，驗證了降低操作成本與提升易用性的可能。","media":[{"asset":"assets/images/original/ferqoExplain1.png","layout":"half","caption":"執行相關設計素材 1","alt":"執行相關設計素材 1"},{"asset":"assets/images/original/ferqoExplain2.png","layout":"half","caption":"執行相關設計素材 2","alt":"執行相關設計素材 2"},{"asset":"assets/images/original/ferqoExplain3.png","layout":"wide","caption":"執行相關設計素材 3","alt":"執行相關設計素材 3"},{"asset":"assets/images/original/ferqoRevamp.png","layout":"portrait","caption":"執行相關設計素材 4","alt":"執行相關設計素材 4"},{"asset":"assets/images/original/ferqoScreenOverview.png","layout":"half","caption":"執行相關設計素材 5","alt":"執行相關設計素材 5"},{"asset":"assets/images/original/ferqoDesignSystem.png","layout":"half","caption":"執行相關設計素材 6","alt":"執行相關設計素材 6"}]}],"outcomes":[{"value":"50%","label":"情境操作時間減少"},{"value":"+30","label":"SUS 易用性分數"},{"value":"模組化","label":"支援跨品牌相容性"}],"name":"Ferqo——打造零摩擦智慧家庭生態系","canonicalSubtitle":"抽象化破碎的 IoT 協定、打破供應商綁定，打造真正以情境驅動的 B2C 體驗。","subtitle":"抽象化破碎的 IoT 協定、打破供應商綁定，打造真正以情境驅動的 B2C 體驗。","year":"2019","keyAchievement":"情境操作時間約減少 50%，SUS 易用性分數提升 30 分。","cover":"assets/images/original/ferqoHero.png","sourceBoard":"assets/images/original/ferqoArtifact.png","cardDescription":"以情境為核心、支援多協定的 0 到 1 智慧家庭平台。","category":"IoT · 智慧家庭","description":"過去作為封閉式智慧家庭系統的代理商，我們的商業擴展受到單一協定（如 Z-Wave）與原廠僵化產品路線圖的嚴重限制。為了取得策略自主性，我們啟動 Ferqo 0 到 1 專案。我負責端到端產品設計，把開放、多協定平台的願景轉化為真正優先服務一般消費者、而非系統整合商的直覺生態系。"},"insurance":{"slug":"insurance","index":"02","title":"建構可擴展的保險 SaaS：從客製孤島走向模組化生態系","role":"產品設計師","timeline":"2024.11–2024.12（1 個月）","team":"保險、商務開發、業務、設計與工程","scope":"使用者訪談、User Flow、Mockup 工程交付、Lead Designer","accent":"#426f9d","soft":"#dfeaf3","dark":"#234867","summary":{"goal":"把高度客製的保險平台轉成可重用模組，支援不同商品與通路。","challenge":"在不可妥協的法規要求下，仍讓長流程清楚、快速，並可適配不同品牌。","outcome":"溝通效率提升兩倍、內部開發成本降低 50%，新客戶設計時間從一週縮短至兩天。"},"sections":[{"order":1,"label":"背景","title":"圍繞情境與商業目標，重新定義模組化架構","body":["IXT 是 AI.f(T) 推出的數位保險平台，核心目標是簡化複雜流程，將報價到出單的完整旅程數位化。","在策略上，IXT 不只是完整數位保險方案，也能拆成模組以支援不同保險商品與通路。","本案聚焦其中一條拆解後的功能線，優化體驗，讓保險商品能更快推出並進入目標市場。"],"points":[{"title":"過度客製","text":"每個專案都變成缺少共通標準的高度客製案，難以擴展。"},{"title":"成本難估","text":"業務反覆釐清需求，設計與工程也難以前期估算工時與成本。"},{"title":"無法規模化","text":"一次性專案無法累積標準模組，限制產能與毛利。"}],"quote":null,"media":[{"asset":"assets/images/original/insuranceIxtIntro.png","layout":"wide","caption":"背景相關設計素材 1","alt":"背景相關設計素材 1"},{"asset":"assets/images/original/insuranceProcess1.png","layout":"half","caption":"背景相關設計素材 2","alt":"背景相關設計素材 2"},{"asset":"assets/images/original/insuranceCompetitive.png","layout":"half","caption":"背景相關設計素材 3","alt":"背景相關設計素材 3"}]},{"order":2,"label":"定義與探索","title":"過度客製推高專案成本","body":["舊系統給客戶極高自由度，近似『保險版 WordPress』，每案都成為高度客製建置，幾乎沒有共通標準。","終端使用者雖有版面與流程彈性，業務卻必須反覆釐清需求，開發團隊也難以估算範圍與成本，最終傷害效率與獲利。","結合業務、客服與 B 端客戶的訪談及資料後，我們找出影響申請體驗與轉換的核心問題。"],"points":[{"title":"申請流程複雜","text":"每頁應聚焦一類資訊，讓使用者知道要準備什麼並順利完成。"},{"title":"法規文字繁重","text":"大量必要揭露與簡化介面的需求彼此衝突。"},{"title":"客戶屬性複雜","text":"系統要同時服務不同身分與需求，但原平台只有單一共用版型。"}],"quote":null,"media":[{"asset":"assets/images/original/insuranceProcess2.png","layout":"wide","caption":"研究與架構相關設計素材 1","alt":"研究與架構相關設計素材 1"},{"asset":"assets/images/original/insuranceTaskCentered.png","layout":"portrait","caption":"研究與架構相關設計素材 2","alt":"研究與架構相關設計素材 2"},{"asset":"assets/images/original/insuranceSplitFlow.png","layout":"wide","caption":"研究與架構相關設計素材 3","alt":"研究與架構相關設計素材 3"}]},{"order":3,"label":"核心策略","title":"法規遵循與使用者體驗之間的拉扯","body":["2B 廠商要求法律聲明高度可見，但商務與終端使用者需要簡單快速的流程，形成三方衝突。","考量保險產業特性，我把法規遵循視為產品開發基礎，採取『優先滿足商業合規，再以視覺架構優化體驗』的策略。","我們定義可重用的保險模板與流程邏輯，在框架內約束客製，使成本可估並支援後續產品擴展。"],"points":[{"title":"法規模組","text":"滿足 2B 廠商對法律聲明可見性的要求並避免違規。"},{"title":"摘要模組","text":"讓使用者三秒掌握保障重點並快速進入申請。"},{"title":"可重用模板","text":"在模板框架內限制客製，使成本可估並能擴展。"}],"quote":null,"media":[{"asset":"assets/images/original/insuranceModular.png","layout":"half","caption":"核心策略相關設計素材 1","alt":"核心策略相關設計素材 1"},{"asset":"assets/images/original/insuranceProcess3.png","layout":"half","caption":"核心策略相關設計素材 2","alt":"核心策略相關設計素材 2"},{"asset":"assets/images/original/insuranceColorVariant.png","layout":"wide","caption":"核心策略相關設計素材 3","alt":"核心策略相關設計素材 3"}]},{"order":4,"label":"設計執行","title":"在法規遵循與易用性之間取得平衡","body":["我採用漸進式揭露，把必要的 2B 合規資訊收進可捲動或展開模組，在確保法遵的同時讓核心保障資訊優先，避免資訊過載。","團隊也以 Figma Variables 建立 Color Token 與命名規則，讓同一套元件能快速套用不同品牌主題，設計時間從約一週縮短至兩天。","Landing Page 被拆成 Hero、特色、方案比較、FAQ 與文件等模板。業務不再從空白頁開始，設計與前端也能在固定限制內調整品牌視覺與文案。"],"points":[{"title":"任務導向設計","text":"使用者聚焦比較方案、上傳文件等單一任務，不受法規雜訊干擾。"},{"title":"可重用 Landing Page","text":"Hero、特色、方案、FAQ 與文件模組化，提高溝通效率。"},{"title":"快速適配客戶","text":"Marsh、新光越南、Richmond 等專案只需調整品牌色、圖像與文案，不再重建基礎。"}],"quote":"拆解原本的高客製架構，讓 IXT 從專案型 SI 工作走向可擴展的保險 SaaS 產品。","media":[{"asset":"assets/images/original/insuranceCaseStudies.png","layout":"wide","caption":"設計執行相關設計素材 1","alt":"設計執行相關設計素材 1"},{"asset":"assets/images/original/insuranceDesignSystem.png","layout":"compact","caption":"設計執行相關設計素材 2","alt":"設計執行相關設計素材 2"},{"asset":"assets/images/original/insuranceMarsh.png","layout":"half","caption":"設計執行相關設計素材 3","alt":"設計執行相關設計素材 3"},{"asset":"assets/images/original/insuranceRichmond.png","layout":"half","caption":"設計執行相關設計素材 4","alt":"設計執行相關設計素材 4"},{"asset":"assets/images/original/insuranceShinKong.png","layout":"wide","caption":"設計執行相關設計素材 5","alt":"設計執行相關設計素材 5"},{"asset":"assets/images/original/insuranceResult1.png","layout":"half","caption":"設計執行相關設計素材 6","alt":"設計執行相關設計素材 6"},{"asset":"assets/images/original/insuranceResult2.png","layout":"half","caption":"設計執行相關設計素材 7","alt":"設計執行相關設計素材 7"},{"asset":"assets/images/original/insuranceResult3.png","layout":"compact","caption":"設計執行相關設計素材 8","alt":"設計執行相關設計素材 8"}]}],"outcomes":[{"value":"2×","label":"商務／業務與客戶溝通效率"},{"value":"50%","label":"內部開發成本降低"},{"value":"2 天","label":"新客戶設計時間，原為一週"}],"name":"建構可擴展的保險 SaaS：從客製孤島走向模組化生態系","canonicalSubtitle":"以設計 Token 驅動的架構，在嚴謹法規遵循與低摩擦 UX 之間取得平衡。","subtitle":"以設計 Token 驅動的架構，在嚴謹法規遵循與低摩擦 UX 之間取得平衡。","year":"2024","keyAchievement":"可重用模組化框架讓溝通效率提升兩倍，內部開發成本降低 50%。","cover":"assets/images/original/insuranceHero.png","sourceBoard":"assets/images/original/insuranceArtifact.png","cardDescription":"平衡法規、易用性、可重用模板與品牌擴展的模組化保險 SaaS 架構。","category":"保險科技 · B2B SaaS","description":"IXT 是 AI.f(T) 推出的數位保險平台，核心目標是簡化複雜保險流程，將報價到出單的完整旅程數位化，優化既有作業並提升效率。"},"onesleeve":{"slug":"onesleeve","index":"03","title":"OneSleeve：一套設計系統，支撐兩個資安品牌","role":"產品設計師","timeline":"2025.12–2026.03","team":"產品、設計與工程","scope":"設計系統架構、PM／RD 跨職能協作、元件治理","accent":"#d8a72d","soft":"#f5e9bd","dark":"#6d5313","summary":{"goal":"用一套設計系統統一兩個資安產品，加快交付並更容易擴展。","challenge":"在新創資源限制下，同時處理品牌稀釋、設計債與多市場壓力。","outcome":"PM—設計迭代從兩週縮短為一週；單畫面建置從三天降為兩天；新產品線改為替換變數即可。"},"sections":[{"order":1,"label":"挑戰","title":"品牌問題，揭露出系統性問題","body":["Cymetrics 與 Vulcan 看起來像兩家不同公司的產品。我們原本要統一品牌，卻挖出了底層設計債。","問題有三層：產品線分散削弱市場定位；沒有共用設計語言，每次修正不一致要耗掉一到兩天；進入中東等新市場時，每種語系（包含 RTL）都要重新適配。","這些都發生在仍尋找市場契合、資源有限，卻必須快速推出 MVP 並隨時可 Demo 的新創情境。它不能只是 Rebrand，必須成為設計系統。"],"points":[{"title":"品牌","text":"分散的產品線稀釋公司市場定位。"},{"title":"設計與工程債","text":"沒有共用語言、每次不一致修正損失一到兩天，Storybook 也難以維護。"},{"title":"擴展瓶頸","text":"每個新市場與語系都要從頭適配。"}],"quote":"兩個產品、兩套設計語言，一個令人困惑的品牌。","media":[{"asset":"assets/images/original/onesleeveProcess1.png","layout":"wide","caption":"挑戰相關設計素材 1","alt":"挑戰相關設計素材 1"},{"asset":"assets/images/original/onesleeveBrandColor.png","layout":"compact","caption":"挑戰相關設計素材 2","alt":"挑戰相關設計素材 2"}]},{"order":2,"label":"策略與決策","title":"務實優先，而非追求完美","body":["緊急 Demo 不斷打亂排程，停下來打造『完美』系統並不現實。我們需要不拖慢上市，又能終結重複造輪子的策略。","維持兩套系統雖彈性最高、沒有前期成本，卻會增加維護並讓品牌持續破碎；全部重建雖最純粹，卻讓成本與複雜度都翻倍。","最後選擇統一與收斂：從既有產品提取、對齊，付出一次性的收斂成本，換取較低維護、較快交付與一致品牌。"],"points":[{"title":"維持現況","text":"彈性最大、無前期成本，但要維護多套系統且品牌持續分裂。"},{"title":"從頭重建","text":"結果最純粹一致，但成本與複雜度都翻倍。"},{"title":"統一與收斂","text":"從現有內容提取，換取易維護、快速交付與一致品牌。"}],"quote":"不是重建，而是把既有產品收斂成一套統一系統。","media":[{"asset":"assets/images/original/onesleeveAdoption.png","layout":"half","caption":"策略相關設計素材 1","alt":"策略相關設計素材 1"},{"asset":"assets/images/original/onesleeveCooperation.png","layout":"half","caption":"策略相關設計素材 2","alt":"策略相關設計素材 2"}]},{"order":3,"label":"基礎與架構","title":"一套系統，兩個品牌","body":["從最底層色彩 Primitive 到畫面生產線，每一層都在一致性與彈性間取得平衡。色彩流經 Brand → Primitive → Semantic → Component 四層，只要定義品牌色，以下內容便自動產生。","不同產品需要不同元件，單一 Library 無法涵蓋所有案例。通用標準元件放在乾淨的 Master Library，各產品客製元件則留在自己的 Child Library。","這個切分防止任何產品為了自身需求改動 Master、污染其他產品；客製只發生在 Child，Master 始終保持乾淨。"],"points":[{"title":"同架構，不同色盤","text":"一套 Token 架構同時服務 Cymetrics 與 Vulcan，保留各自品牌色。"},{"title":"乾淨的 Master","text":"通用元件在共用 Master 中維持標準與保護。"},{"title":"彈性的 Children","text":"產品特有元件留在各自 Child Library。"}],"quote":null,"media":[{"asset":"assets/images/original/onesleeveProcess3.png","layout":"wide","caption":"基礎相關設計素材 1","alt":"基礎相關設計素材 1"},{"asset":"assets/images/original/onesleeveProcess2.png","layout":"wide","caption":"基礎相關設計素材 2","alt":"基礎相關設計素材 2"},{"asset":"assets/images/original/onesleeveUseCase.png","layout":"wide","caption":"基礎相關設計素材 3","alt":"基礎相關設計素材 3"}]},{"order":4,"label":"治理與導入","title":"做出來只完成一半，真正的另一半是讓大家採用","body":["設計系統很少因為設計不好而死，通常是因為沒有人採用。真正挑戰是讓孤島式組織真的使用它。","我們沒有只靠權威推動，而是先讓每一方看見價值：PM 看見上市更快；工程看見規格一致、一次修改與較低維護；管理者看見痛點被整合成由上而下的支持。","工程團隊認同後，採用從『被要求』變成『主動支持』。重複元件不再分開維護，Storybook 成為 Single Source of Truth，PM 甚至能自行處理小型開發調整。"],"points":[{"title":"PM—商業價值","text":"縮短上市時間，更快驗證。"},{"title":"RD—工程價值","text":"規格一致、一次修改，共用元件降低維護。"},{"title":"Manager—授權","text":"把痛點整合為由上而下的支持。"}],"quote":"OneSleeve 讓我理解：設計系統真正的難題不是技術，而是讓孤島式組織願意採用。","media":[{"asset":"assets/images/original/onesleeveCymetricsPanel.png","layout":"half","caption":"導入相關設計素材 1","alt":"導入相關設計素材 1"},{"asset":"assets/images/original/onesleeveVulcanPanel.png","layout":"half","caption":"導入相關設計素材 2","alt":"導入相關設計素材 2"},{"asset":"assets/images/original/onesleeveResult1.png","layout":"portrait","caption":"導入相關設計素材 3","alt":"導入相關設計素材 3"},{"asset":"assets/images/original/onesleeveResult2.png","layout":"half","caption":"導入相關設計素材 4","alt":"導入相關設計素材 4"},{"asset":"assets/images/original/onesleeveResult4.png","layout":"half","caption":"導入相關設計素材 5","alt":"導入相關設計素材 5"},{"asset":"assets/images/original/onesleeveResult5.png","layout":"half","caption":"導入相關設計素材 6","alt":"導入相關設計素材 6"},{"asset":"assets/images/original/onesleeveResult6.png","layout":"half","caption":"導入相關設計素材 7","alt":"導入相關設計素材 7"}]}],"outcomes":[{"value":"2 → 1 週","label":"PM—設計迭代週期"},{"value":"3 → 2 天","label":"單畫面建置時間"},{"value":"替換變數","label":"不用從頭建立新產品線"}],"name":"OneSleeve：一套設計系統，支撐兩個資安品牌","canonicalSubtitle":"在新創資源限制下，用統一設計系統把 Cymetrics 與 Vulcan 收進同一產品家族，縮短迭代、加快交付並支援新市場。","subtitle":"在新創資源限制下，用統一設計系統把 Cymetrics 與 Vulcan 收進同一產品家族，縮短迭代、加快交付並支援新市場。","year":"2026","keyAchievement":"單一系統讓 PM—設計迭代減半，單畫面建置從三天縮短為兩天。","cover":"assets/images/original/onesleeveHero.png","sourceBoard":"assets/images/original/onesleeveArtifact.png","cardDescription":"以四層 Token 與 Master／Child 元件庫統一 Cymetrics 與 Vulcan。","category":"資安 · 設計系統","description":"兩個資安產品平行發展、仍在尋找市場契合時，破碎的設計削弱品牌並拖慢開發。我從設計端提議把 Cymetrics 與 Vulcan 統一成 OneSleeve 產品家族，透過四層 Token 架構與 Master／Child 元件庫，讓單一系統服務兩個品牌。"},"alphacamp":{"slug":"alphacamp","index":"04","title":"程式教育平台留存策略：從功能交付走向深度使用者連結","role":"UX 研究員","timeline":"2020.11–2021.01（3 個月）","team":"Ricky、Kim、Evy","scope":"使用者研究","accent":"#ff5a16","soft":"#ffe1d0","dark":"#8d2d08","summary":{"goal":"診斷品牌忠誠現況，找出長期互動的驅動因子與阻礙。","challenge":"課程結束後校友互動大幅下滑，社群參與低，也缺乏主動分享作品與成功經驗的動機。","outcome":"定義 8 項以上針對性服務提案，並把研究洞察納入公司年度產品路線圖。"},"sections":[{"order":1,"label":"定義與探索","title":"透過混合研究找出核心流程與 Persona","body":["專案初期，我們面對抽象且高度不確定的『品牌關係』議題。我負責建立質化研究框架，補足團隊最初的領域知識缺口。","我與夥伴主持內部專家工作坊與深度訪談，協助團隊統整決策者期待，並把破碎的商業觀察轉成一致、可視化的知識基礎。","透過 Stakeholder Map，我們映射學生、助教、領域專家與行銷間的互動網絡，找出影響學習動機與參與的關鍵節點與接觸點。"],"points":[{"title":"加速領域知識建立","text":"專家工作坊與訪談彌補知識缺口並整合商業觀察。"},{"title":"生態系與影響分析","text":"Stakeholder Map 找出互動網絡與關鍵動機接觸點。"},{"title":"Proto-Persona 與初始旅程","text":"Kelly 轉職者、Tom 進修者與 Amy 探索者，成為後續訪談的聚焦基礎。"}],"quote":null,"media":[{"asset":"assets/images/original/alphacampProcess1.jpg","layout":"wide","caption":"定義與探索相關設計素材 1","alt":"定義與探索相關設計素材 1"}]},{"order":2,"label":"研究洞察","title":"從訪談洞察萃取核心價值主張","body":["透過 10 位現有與潛在學生的深度訪談及完整資料統整，我帶領團隊從複雜行為變數中萃取三種 Persona。","為在顧及開發成本下最大化商業影響，我提出策略取捨：把後續研究與解法聚焦在商業潛力最高、動機最明確的兩個核心 Persona。","Kelly 轉職者需要可視化進度追蹤與持續情緒支持，以緩解轉職不確定；Tom 進修者需要高品質濃縮摘要與不打擾的提醒，以配合零碎時間與職場疲勞。"],"points":[{"title":"Kelly—轉職者","text":"最迫切需要可視化進度與持續情緒鼓勵。"},{"title":"Tom—進修者","text":"需要濃縮摘要與不打擾的提醒系統。"},{"title":"策略取捨","text":"把資源聚焦於動機清楚、商業潛力最高的 Persona。"}],"quote":null,"media":[{"asset":"assets/images/original/alphacampProcess2.jpg","layout":"wide","caption":"核心洞察相關設計素材 1","alt":"核心洞察相關設計素材 1"}]},{"order":3,"label":"挑戰與核心策略","title":"解開「關係」黑盒子","body":["Persona 描述靜態使用者特徵，卻無法解釋關係為何增強或惡化的動態觸發與行為證據。缺少這層情境，解法容易建立在假設而非現實。","我們把分析從功能操作轉向底層情緒旅程，探索什麼創造深度連結、什麼造成挫折與斷裂。","透過 Love Letter & Breakup Letter 研究法，我們取得情境證據，再用 Relationship Critical Moments Map 把抽象關係轉成可討論、可設計的情境單位。"],"points":[{"title":"關鍵情緒接觸點","text":"檢視學生與平台關係在不同學習階段如何波動。"},{"title":"情緒回溯","text":"情書與分手信揭露安全、引導、孤立與斷裂的時刻。"},{"title":"關係關鍵時刻地圖","text":"把觸發事件、情緒、需求、急迫性與頻率具體化。"}],"quote":"『情書』稱讚安全、受引導的路徑；『分手信』描述過度密集課程帶來的窒息孤立感。","media":[{"asset":"assets/images/original/alphacampProcess3.jpg","layout":"wide","caption":"概念策略相關設計素材 1","alt":"概念策略相關設計素材 1"}]},{"order":4,"label":"設計成果與影響","title":"雙軌生態系：以服務轉型推動持續學習","body":["對 Kelly，核心策略是『消除未知』與『提供情緒緩衝』，透過能力診斷、學習路線圖、實作與同儕支持，把學習壓力轉成可見的成長動機。","對重視 ROI、時間零碎的工作者 Tom，策略聚焦流程自動化與高品質資訊取得，讓學習無縫融入忙碌生活。","研究說服團隊：流失不是功能不足，而是孤單與焦慮。這促成第二、三學期課程調整，也把開發資源從單純作業系統轉向 Roadmap 與 Career Guidance。"],"points":[{"title":"生態系一—Kelly","text":"導航、診斷、實作與情緒支持建立安全感與清楚成就軌跡。"},{"title":"生態系二—Tom","text":"高效率學習工具與專業人脈支援零碎時間與高 ROI 期待。"},{"title":"自助與同儕支持","text":"Roadmap 與小組同儕機制，讓服務擴展不需線性增加助教。"}],"quote":"策略轉向：從功能走向關係。","media":[{"asset":"assets/images/original/alphacampHero.jpg","layout":"wide","caption":"服務模型相關設計素材 1","alt":"服務模型相關設計素材 1"}]}],"outcomes":[{"value":"8+","label":"針對性服務提案"},{"value":"10","label":"深度研究訪談"},{"value":"年度路線圖","label":"研究洞察正式納入產品規劃"}],"name":"程式教育平台留存策略：從功能交付走向深度使用者連結","canonicalSubtitle":"透過 UXR 打破學習的「孤立感」：從交易關係走向夥伴關係的策略路線圖。","subtitle":"透過 UXR 打破學習的「孤立感」：從交易關係走向夥伴關係的策略路線圖。","year":"2021","keyAchievement":"定義 8 項以上服務提案，並把研究洞察納入公司年度產品路線圖。","cover":"assets/images/original/alphacampHero.jpg","sourceBoard":"assets/images/original/alphacampArtifact.png","cardDescription":"以三個月 UX 研究與服務設計，重新定義課後留存、進展與長期品牌忠誠。","category":"教育科技 · 服務策略","description":"在台灣領先的程式教育平台 ALPHAcamp，我們面臨關鍵商業挑戰：學生完成課程後，互動與持續留存明顯下降。為此，我與一位夥伴進行三個月的使用者研究與服務設計。"}}},"ja":{"site":{"brand":"Timothy Lau","browserTitle":"Timothy Lau — プロダクトデザイナー","nav":{"work":"Work","about":"About","strengths":"Strengths","contact":"Contact","menu":"メニュー"},"localeLabel":"言語","skip":"本文へ移動","footer":"Patience, clarity, and care."},"home":{"hero":{"eyebrow":"プロダクトデザイナー · チームコネクター","titleBefore":"忍耐と明快さで、人とアイデアを","titleAccent":"つなぎます。","body":"丁寧に聞き、見えない仕組みを可視化し、異なる視点を一つの意思決定へつなぐことで複雑な製品を設計します。","primary":"選定プロジェクトを見る","secondary":"話を始める","imageAlt":"落ち着いたスタジオにいるプロダクトデザイナー"},"about":{"eyebrow":"About me","titleBefore":"人とアイデアをつなぎ、","titleAccent":"より良い結果をつくる。","body":"チームの真ん中にいるとき、最も価値を発揮できます。各専門分野が見ているものを聞き、制約を共有地図へ翻訳し、難しい判断が明確になるまで必要な時間を確保します。画面だけでなく、それを生む対話の質も大切にします。","imageAlt":"共同ワークショップを進行するデザイナー","principles":[{"title":"まず聞く","body":"作るものを決める前に、文脈、意図、見えない制約を理解する。"},{"title":"対話を進める","body":"対立する視点を、チームで検証できる一つのモデルへ変える。"},{"title":"システムで考える","body":"個別画面を製品、運用、長期的な影響へつなぐ。"}]},"work":{"eyebrow":"Selected work","title":"複雑なシステムを、前へ進めるほど理解可能に。","body":"スマートホーム、保険運用、セキュリティシステム、教育戦略の4プロジェクト。"},"strengths":{"eyebrow":"How I work","title":"問題を見る落ち着きと、前へ進める実務性。","body":"リサーチ、プロダクト、デザイン、開発、運用の間をつなぐ仕事に価値を出します。","items":[{"title":"曖昧さへの忍耐","body":"早すぎる確信を避け、次に役立つ問いを立て、証拠が方向を変える余地を残す。"},{"title":"共通理解","body":"フロー、モデル、プロトタイプ、ワークショップで同じシステムを見えるようにする。"},{"title":"専門分野をつなぐ","body":"言葉と動機を橋渡しし、良いアイデアを洞察から実装まで生き残らせる。"}]},"teamValue":{"eyebrow":"What teams get","title":"目に見える成果を強くする、目に見えない仕事。","items":[{"title":"単純化しすぎない明快さ","body":"重要な制約を残しながら、複雑さを議論可能にする。"},{"title":"急がない前進","body":"可逆的な実験と、慎重に決めるべき判断を区別する。"},{"title":"デザインを越えた所有","body":"早期からパートナーを巻き込み、方向をチーム全体のものにする。"}]},"contact":{"eyebrow":"Let’s connect","title":"複雑な部分を持ってきてください。","body":"利用者ニーズ、技術制約、組織の現実を一つの方向へまとめる製品・サービス課題に関心があります。","button":"連絡する","availability":"プロダクトデザインの機会を検討中"}},"ui":{"viewCase":"ケーススタディを見る","keyAchievement":"主な成果","caseStudy":"ケーススタディ","backToWork":"選定プロジェクトへ戻る","role":"役割","timeline":"期間","team":"チーム","scope":"範囲","snapshot":"プロジェクト概要","goal":"目標","challenge":"課題","outcome":"成果","outcomes":"成果","outcomesBody":"元のケーススタディに記録された定量的な成果です。","sourceBoard":"元のプロジェクトボード","sourceBoardTitle":"元資料を文脈ごと確認する。","sourceBoardBody":"再レイアウトしても章立て、図、インターフェース資料が失われないよう、元ボードを残しています。","openImage":"画像を拡大","openBoard":"ボード全体を開く","close":"画像ビューアを閉じる","related":"関連プロジェクト","relatedTitle":"ほかのケーススタディへ。","viewAll":"すべての作品を見る","contactEyebrow":"一緒に取り組む","contactTitle":"複雑なプロダクト課題がありますか？","contactBody":"チームが何を理解し、揃え、前へ進めようとしているかを聞かせてください。","contactButton":"連絡する","returnHome":"ホームへ戻る","imageCount":"プロジェクト画像"},"projects":{"ferqo":{"slug":"ferqo","index":"01","title":"Ferqo — 摩擦のないスマートホーム・エコシステムの構築","role":"プロダクトデザイナー／プロダクトマネージャー","timeline":"2018.11–2019.11","team":"プロダクト・エンジニアリング横断チーム","scope":"エンドツーエンド製品設計、UXリサーチ、部門横断リード","accent":"#c96345","soft":"#f1ddd4","dark":"#7f3827","summary":{"goal":"ハードウェアに依存しない0→1のB2C基盤を立ち上げ、ベンダーロックインを解消する。","challenge":"未検証のユーザー仮説と、異なるIoTプロトコルを一貫した体験へ統合する複雑さ。","outcome":"シナリオ操作時間を約50%削減し、SUSを30ポイント改善。ブランド横断のモジュール基盤も構築した。"},"sections":[{"order":1,"label":"事業課題","title":"ベンダーロックインを解消し、真のB2C UXを再定義する","body":["従来のスマートホームは単一プロトコルとメーカーのロードマップに利用者を縛り、ブランド横断の自動化と事業拡張を妨げていました。","既存アプリはエンジニア向けダッシュボードのようで、利用者は個々の機器を探し、技術カテゴリを理解しなければならず、日常の簡単な操作に大きな認知負荷が生じていました。","最終的な洞察は明快でした。アプリを開く方が壁のスイッチを押すより遅ければ、デジタル製品は失敗です。"],"points":[{"title":"プロトコルのサイロ","text":"単一プロトコルがブランド横断の自動化を制限。"},{"title":"機器中心の“偽B2C” UI","text":"技術的な画面が利用者に機器探しを強いる。"},{"title":"物理スイッチとの競争","text":"日常シナリオは物理操作より速く完了する必要がある。"}],"quote":null,"media":[{"asset":"assets/images/original/ferqoProcess1.png","layout":"wide","caption":"課題のデザイン資料 1","alt":"課題のデザイン資料 1"},{"asset":"assets/images/original/ferqoProcess3.png","layout":"portrait","caption":"課題のデザイン資料 2","alt":"課題のデザイン資料 2"}]},{"order":2,"label":"リサーチと主要な洞察","title":"「ワンタップ」の価値を検証","body":["当初は細かな制御でDIY市場に参入する想定でしたが、9件のデプスインタビューから根本的なずれが判明しました。利用者はIoTで遊びたいわけではなく、アプリを積極的に開くこともありません。","求められていたのは「ワンタップで快適」を実現するプレミアムな解決策でした。これにより、機能量の競争から、最少の操作で快適な状態をつくる価値戦略へ転換しました。"],"points":[{"title":"認知負荷","text":"単純な要望を、機器・プロトコル・操作へ翻訳させていた。"},{"title":"メンタルモデルの不一致","text":"利用者は機器一覧ではなく、部屋とシナリオで考える。"},{"title":"分断されたエコシステム","text":"映画モードなどの日常ルーティンにはブランド横断の連携が必要。"}],"quote":null,"media":[{"asset":"assets/images/original/ferqoProcess2.png","layout":"wide","caption":"リサーチと洞察のデザイン資料 1","alt":"リサーチと洞察のデザイン資料 1"}]},{"order":3,"label":"実現可能性","title":"エンジニアとMVP範囲・技術的複雑さを明確化","body":["実現可能性を担保するため、技術スコープの整理を主導しました。ワークショップでリソースと各社API能力を確認し、シナリオ制御を実装可能なMVPモジュールへ分解しました。","システム構成図とフローでフロント／バックエンドの責任を定義し、ロードマップを再優先付け。設計と実装の合意をつくりました。","フローは、機器一覧ではなく部屋で整理する、頻用する3機器を各部屋の先頭に置く、高度な設定を深い階層へ移す、という3原則で再構成しました。"],"points":[{"title":"部屋中心のナビゲーション","text":"空間で考えるメンタルモデルに合わせ、機器探しをなくす。"},{"title":"頻用機器を先頭へ","text":"主要操作をスクロールなしで実行。"},{"title":"複雑さを段階表示","text":"日常画面では必要な内容だけを見せ、プロトコル設定は奥に保持。"}],"quote":null,"media":[{"asset":"assets/images/original/ferqoUserFlow.png","layout":"portrait","caption":"設計判断のデザイン資料 1","alt":"設計判断のデザイン資料 1"},{"asset":"assets/images/original/ferqoStructure.png","layout":"half","caption":"設計判断のデザイン資料 2","alt":"設計判断のデザイン資料 2"},{"asset":"assets/images/original/ferqoCompare.png","layout":"half","caption":"設計判断のデザイン資料 3","alt":"設計判断のデザイン資料 3"}]},{"order":4,"label":"設計と成果","title":"指一本で家全体を操作する","body":["利用者は部屋で機器を記憶するという観察を基に、左右スワイプで部屋を切り替え、利用頻度の高い機器を先頭に配置しました。ボタンとタッチ領域も大きくして識別しやすくしました。","機器操作を1ページに集約し、リモコン内容は好みに合わせて並べ替え可能。ウィジェットを使えばアプリを開かずにシーンを実行できます。","既存FibaroアプリとのA/Bテストでは、日常ルーティンの手順と時間がほぼ半減し、新版SUSは平均約30ポイント向上しました。"],"points":[{"title":"部屋中心ロジック","text":"左右スワイプで部屋と機器を切り替える。"},{"title":"オールインワン操作","text":"ページ移動なしで機器を操作。"},{"title":"アプリ外のシーン操作","text":"利用者自身でウィジェットを設定。"}],"quote":"Ferqoは最終的に顧客側で公開されませんでしたが、部屋中心・シナリオ中心の方向性は、操作コスト削減と体感ユーザビリティ向上を検証しました。","media":[{"asset":"assets/images/original/ferqoExplain1.png","layout":"half","caption":"実装のデザイン資料 1","alt":"実装のデザイン資料 1"},{"asset":"assets/images/original/ferqoExplain2.png","layout":"half","caption":"実装のデザイン資料 2","alt":"実装のデザイン資料 2"},{"asset":"assets/images/original/ferqoExplain3.png","layout":"wide","caption":"実装のデザイン資料 3","alt":"実装のデザイン資料 3"},{"asset":"assets/images/original/ferqoRevamp.png","layout":"portrait","caption":"実装のデザイン資料 4","alt":"実装のデザイン資料 4"},{"asset":"assets/images/original/ferqoScreenOverview.png","layout":"half","caption":"実装のデザイン資料 5","alt":"実装のデザイン資料 5"},{"asset":"assets/images/original/ferqoDesignSystem.png","layout":"half","caption":"実装のデザイン資料 6","alt":"実装のデザイン資料 6"}]}],"outcomes":[{"value":"50%","label":"シナリオ操作時間を削減"},{"value":"+30","label":"SUSユーザビリティスコア"},{"value":"モジュール型","label":"ブランド横断の互換性を支援"}],"name":"Ferqo — 摩擦のないスマートホーム・エコシステムの構築","canonicalSubtitle":"断片化したIoTプロトコルを抽象化し、ベンダーロックインを解消。シナリオ主導の真のB2C体験へ。","subtitle":"断片化したIoTプロトコルを抽象化し、ベンダーロックインを解消。シナリオ主導の真のB2C体験へ。","year":"2019","keyAchievement":"シナリオ操作時間を約50%削減し、SUSを30ポイント改善。","cover":"assets/images/original/ferqoHero.png","sourceBoard":"assets/images/original/ferqoArtifact.png","cardDescription":"ベンダーロックインを解消し、断片化したIoTをシナリオ中心のB2C体験に変えた0→1プラットフォーム。","category":"IoT · スマートホーム","description":"閉鎖型スマートホーム製品の販売代理を行っていた当時、単一プロトコルとメーカーの固定ロードマップが事業拡張を強く制限していました。そこで戦略的な自立を目指し、Ferqoの0→1プロジェクトを開始。私はエンドツーエンドの製品設計を主導し、オープンなマルチプロトコル基盤を、システムインテグレーターではなく生活者を優先する直感的な体験へ翻訳しました。"},"insurance":{"slug":"insurance","index":"02","title":"拡張可能な保険SaaSの設計：個別最適のサイロからモジュール型エコシステムへ","role":"プロダクトデザイナー","timeline":"2024.11–2024.12（1か月）","team":"保険、事業開発、営業、デザイン、開発","scope":"ユーザーインタビュー、ユーザーフロー、開発へのモック引き渡し、リードデザイン","accent":"#426f9d","soft":"#dfeaf3","dark":"#234867","summary":{"goal":"高い個別開発依存を再利用可能なモジュールに変え、複数の商品とチャネルを支える。","challenge":"厳格な規制要件を守りながら、長い申請フローを明快・迅速にし、複数ブランドへ適応する。","outcome":"コミュニケーション効率を2倍、社内開発コストを50%削減し、新規顧客向けデザインを1週間から2日に短縮。"},"sections":[{"order":1,"label":"背景","title":"シナリオと事業目標を軸にモジュール構造を再設計","body":["IXTは見積から契約発行までの複雑な保険プロセスをデジタル化し、業務を最適化するプラットフォームです。","完全なデジタル保険ソリューションであるだけでなく、異なる保険商品や販売チャネルを支えるモジュールにも分解できます。","本プロジェクトはその機能ラインの一つを最適化し、保険商品の立ち上げと市場投入を速めました。"],"points":[{"title":"過剰な個別対応","text":"共通標準がなく、案件ごとに高度な個別開発が発生。"},{"title":"見積もれないコスト","text":"営業の要件確認が反復し、設計・開発も早期の工数見積が困難。"},{"title":"拡張性不足","text":"単発案件では標準モジュールが蓄積されない。"}],"quote":null,"media":[{"asset":"assets/images/original/insuranceIxtIntro.png","layout":"wide","caption":"背景のデザイン資料 1","alt":"背景のデザイン資料 1"},{"asset":"assets/images/original/insuranceProcess1.png","layout":"half","caption":"背景のデザイン資料 2","alt":"背景のデザイン資料 2"},{"asset":"assets/images/original/insuranceCompetitive.png","layout":"half","caption":"背景のデザイン資料 3","alt":"背景のデザイン資料 3"}]},{"order":2,"label":"定義と探索","title":"過剰なカスタマイズがプロジェクトコストを押し上げる","body":["旧システムは「保険版WordPress」のように自由度が高く、ほぼ共通標準のない個別開発を生んでいました。","画面やフローの自由度と引き換えに、営業は要件確認を繰り返し、開発は範囲と費用を予測できず、効率と収益性が低下しました。","営業、サポート、B2B顧客への調査から、申請体験とコンバージョンを妨げる主要課題を特定しました。"],"points":[{"title":"複雑な申請","text":"各ページを一種類の情報に集中させ、準備内容を明確にする必要。"},{"title":"膨大な法的文書","text":"必須の規制文言と画面簡素化が衝突。"},{"title":"多様な顧客属性","text":"複数の身分・要望に単一レイアウトでは対応できない。"}],"quote":null,"media":[{"asset":"assets/images/original/insuranceProcess2.png","layout":"wide","caption":"リサーチと構造のデザイン資料 1","alt":"リサーチと構造のデザイン資料 1"},{"asset":"assets/images/original/insuranceTaskCentered.png","layout":"portrait","caption":"リサーチと構造のデザイン資料 2","alt":"リサーチと構造のデザイン資料 2"},{"asset":"assets/images/original/insuranceSplitFlow.png","layout":"wide","caption":"リサーチと構造のデザイン資料 3","alt":"リサーチと構造のデザイン資料 3"}]},{"order":3,"label":"コア戦略","title":"規制対応とユーザー体験の緊張関係","body":["2Bベンダーは免責事項の高い視認性を求め、事業側とエンドユーザーは簡単で速いフローを求めます。","保険業界では規制遵守を製品開発の基礎と定め、事業上のコンプライアンスを優先しつつ、視覚構造で体験を最適化しました。","再利用可能な保険テンプレートとフローを定義し、その枠内でカスタマイズを制約することで、費用予測と将来拡張を可能にしました。"],"points":[{"title":"規制モジュール","text":"法的免責の視認性を確保し、違反を防ぐ。"},{"title":"要約モジュール","text":"3秒で保障の要点を把握し、素早く申請へ進める。"},{"title":"再利用テンプレート","text":"制約内で個別対応し、費用を予測可能にする。"}],"quote":null,"media":[{"asset":"assets/images/original/insuranceModular.png","layout":"half","caption":"中核戦略のデザイン資料 1","alt":"中核戦略のデザイン資料 1"},{"asset":"assets/images/original/insuranceProcess3.png","layout":"half","caption":"中核戦略のデザイン資料 2","alt":"中核戦略のデザイン資料 2"},{"asset":"assets/images/original/insuranceColorVariant.png","layout":"wide","caption":"中核戦略のデザイン資料 3","alt":"中核戦略のデザイン資料 3"}]},{"order":4,"label":"デザイン実装","title":"規制対応と使いやすさの両立","body":["必須のコンプライアンス情報をスクロール／展開モジュールへ収める段階的開示を採用。法令を守りながら、利用者は保障の重要情報と判断に集中できます。","Figma Variablesでカラートークンと命名規則を整備し、同じコンポーネントへ複数ブランドを数クリックで適用。デザイン期間を約1週間から2日に短縮しました。","ランディングページをHero、特徴、プラン比較、FAQ、資料のテンプレートへ分解。営業は白紙から始めず、デザインとフロントエンドは制約内でブランドと文言を調整できます。"],"points":[{"title":"タスク中心設計","text":"プラン比較や資料アップロードなど、一つの作業へ集中。"},{"title":"再利用ランディングページ","text":"主要セクションをモジュール化し、伝達効率を向上。"},{"title":"顧客への迅速適応","text":"Marsh、新光ベトナム、Richmondなどで基盤を再構築せずブランドを適用。"}],"quote":"高カスタマイズ構造を分解し、IXTを案件型SIから拡張可能な保険SaaSへ移行させました。","media":[{"asset":"assets/images/original/insuranceCaseStudies.png","layout":"wide","caption":"設計実行のデザイン資料 1","alt":"設計実行のデザイン資料 1"},{"asset":"assets/images/original/insuranceDesignSystem.png","layout":"compact","caption":"設計実行のデザイン資料 2","alt":"設計実行のデザイン資料 2"},{"asset":"assets/images/original/insuranceMarsh.png","layout":"half","caption":"設計実行のデザイン資料 3","alt":"設計実行のデザイン資料 3"},{"asset":"assets/images/original/insuranceRichmond.png","layout":"half","caption":"設計実行のデザイン資料 4","alt":"設計実行のデザイン資料 4"},{"asset":"assets/images/original/insuranceShinKong.png","layout":"wide","caption":"設計実行のデザイン資料 5","alt":"設計実行のデザイン資料 5"},{"asset":"assets/images/original/insuranceResult1.png","layout":"half","caption":"設計実行のデザイン資料 6","alt":"設計実行のデザイン資料 6"},{"asset":"assets/images/original/insuranceResult2.png","layout":"half","caption":"設計実行のデザイン資料 7","alt":"設計実行のデザイン資料 7"},{"asset":"assets/images/original/insuranceResult3.png","layout":"compact","caption":"設計実行のデザイン資料 8","alt":"設計実行のデザイン資料 8"}]}],"outcomes":[{"value":"2×","label":"事業開発／営業と顧客のコミュニケーション効率"},{"value":"50%","label":"社内開発コスト削減"},{"value":"2日","label":"1週間かかっていた新規顧客デザイン"}],"name":"拡張可能な保険SaaSの設計：個別最適のサイロからモジュール型エコシステムへ","canonicalSubtitle":"デザイントークン主導の構造で、厳格な規制対応と摩擦の少ないUXを両立。","subtitle":"デザイントークン主導の構造で、厳格な規制対応と摩擦の少ないUXを両立。","year":"2024","keyAchievement":"再利用可能なモジュール構造により、コミュニケーション効率を2倍、社内開発コストを50%削減。","cover":"assets/images/original/insuranceHero.png","sourceBoard":"assets/images/original/insuranceArtifact.png","cardDescription":"規制対応、使いやすさ、再利用テンプレート、ブランド拡張を両立するモジュール型保険SaaS。","category":"Insurtech · B2B SaaS","description":"IXTはAI.f(T)が提供するデジタル保険プラットフォームです。複雑な保険業務を簡素化し、見積から契約発行までをデジタル化することで、既存業務の最適化と効率向上を目指しました。"},"onesleeve":{"slug":"onesleeve","index":"03","title":"OneSleeve：2つのセキュリティブランドを支える1つのデザインシステム","role":"プロダクトデザイナー","timeline":"2025.12–2026.03","team":"プロダクト、デザイン、エンジニアリング","scope":"デザインシステム構造、PM／RD協業、コンポーネントガバナンス","accent":"#d8a72d","soft":"#f5e9bd","dark":"#6d5313","summary":{"goal":"1つのデザインシステムで2製品を統合し、開発を高速化して拡張を容易にする。","challenge":"スタートアップの制約下で、ブランド希薄化、デザイン負債、多市場対応を同時に解決する。","outcome":"PM–デザイン反復を2週から1週、画面構築を3日から2日に短縮。新製品は変数の差し替えで開始可能にした。"},"sections":[{"order":1,"label":"課題","title":"ブランド問題がシステム問題を露呈した","body":["CymetricsとVulcanは別会社の製品のように見えました。統一を始めると、その下のデザイン負債が明らかになりました。","製品ラインの分散は市場での位置付けを弱め、共通言語がないため不整合の修正に1〜2日を失い、RTLを含む新市場ごとに再適応が必要でした。","限られた資源で市場適合を探りながらMVPとデモを急ぐ状況では、単なるリブランドでは足りず、デザインシステムが必要でした。"],"points":[{"title":"ブランド","text":"分散した製品群が市場ポジションを希薄化。"},{"title":"設計・開発負債","text":"共通言語がなく、不整合修正とStorybook維持にコスト。"},{"title":"拡張のボトルネック","text":"新市場・言語ごとにゼロから適応。"}],"quote":"2つの製品、2つのデザイン言語、1つの混乱したブランド。","media":[{"asset":"assets/images/original/onesleeveProcess1.png","layout":"wide","caption":"課題のデザイン資料 1","alt":"課題のデザイン資料 1"},{"asset":"assets/images/original/onesleeveBrandColor.png","layout":"compact","caption":"課題のデザイン資料 2","alt":"課題のデザイン資料 2"}]},{"order":2,"label":"戦略と意思決定","title":"完璧さより実用性","body":["緊急デモで予定が崩れる中、完璧なシステムのために停止するのは非現実的でした。市場投入を遅らせず、作り直しを終わらせる戦略が必要でした。","現状維持は柔軟ですが保守が増え、ブランドは分断されたまま。全面再構築は純粋な成果になる一方、費用と複雑さが倍になります。","既存資産から抽出して統一・収束する案を選び、前期の調整コストと引き換えに保守性、速度、一貫性を得ました。"],"points":[{"title":"現状維持","text":"柔軟だが複数システムを維持し、ブランドも分断。"},{"title":"全面再構築","text":"最も整合するが、費用と複雑さが倍。"},{"title":"統一・収束","text":"既存から抽出し、保守性・速度・ブランド一貫性を向上。"}],"quote":"再構築ではなく、既存製品を1つのシステムへ収束させる。","media":[{"asset":"assets/images/original/onesleeveAdoption.png","layout":"half","caption":"戦略のデザイン資料 1","alt":"戦略のデザイン資料 1"},{"asset":"assets/images/original/onesleeveCooperation.png","layout":"half","caption":"戦略のデザイン資料 2","alt":"戦略のデザイン資料 2"}]},{"order":3,"label":"基盤と構造","title":"1つのシステム、2つのブランド","body":["色の最小単位から画面生産まで、一貫性と柔軟性を両立。Brand → Primitive → Semantic → Componentの4層を通じ、ブランド色を決めれば下位トークンが生成されます。","全製品共
